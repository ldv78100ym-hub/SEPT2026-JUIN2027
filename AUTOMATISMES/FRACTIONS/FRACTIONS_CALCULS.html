    <script>
        MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\]']
                ]
            },
            svg: { fontCache: 'global' }

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer>
    </script>

    <style>

<body>

    <div class="card" id="app">
        <div class="header">
            <h1>🧮 Résultat d’un calcul</h1>
            <span class="badge" id="levelBadge">Niveau 1</span>
            <div class="stats" id="statsDisplay">
                <span>✅ <span class="num ok" id="successCount">0</span></span>
                <span>❌ <span class="num ko" id="errorCount">0</span></span>
                <span>📊 <span class="num" id="totalCount">0</span></span>
            </div>
        </div>

        <!-- Sélecteur de niveau avec déverrouillage -->
        <div class="level-selector">
            <label>Niveau :</label>
            <button class="level-btn active" data-level="1" disabled>1</button>
            <button class="level-btn" data-level="2" disabled>2 🔒</button>
            <button class="level-btn" data-level="3" disabled>3 🔒</button>
            <button class="level-btn" data-level="4" disabled>4 🔒</button>
            <span style="font-size:12px; color:#64748b; margin-left:6px;">
                (1: entier+frac • 2: 2 entiers+frac • 3: 2 frac+entier • 4: 3 frac avec parenthèses)
            </span>
        </div>
        <div id="unlockMessage" class="unlock-message">🎉 Niveau suivant débloqué !</div>

        <div class="question-block">
            <div class="question-label">
                <span class="icon">🎯</span>
                Calculez et choisissez le résultat exact de l’expression suivante&nbsp;:
            </div>
            <div class="expression-display">
                <span class="math" id="expressionLatex">\(3 - \dfrac{-2}{5}\)</span>
                <span class="equal-sign">⟶</span>
                <span class="target">?</span>
            </div>
        </div>

        <div class="answers-grid" id="answersContainer"></div>

        <div class="actions">
            <button class="btn btn-primary" id="submitBtn">📤 Soumettre</button>
            <button class="btn btn-outline" id="resetBtn">🔄 Recommencer</button>
            <button class="btn btn-success" id="saveBtn">💾 Enregistrer JSON</button>
            <button class="btn btn-warning" id="loadBtn">📂 Charger JSON</button>
        </div>

        <div class="feedback" id="feedback">
            <div class="result" id="resultDisplay">
                <span class="icon" id="resultIcon">✅</span>
                <span id="resultText">Correct !</span>
            </div>
            <div class="explanation" id="explanationText"></div>
        </div>

        <div class="json-status" id="jsonStatus">
            <span class="dot neutral" id="statusDot"></span>
            <span id="statusText">Aucune donnée en mémoire</span>
        </div>
    </div>

    <script>
        // ================================================================
        //  UTILITAIRES : PGCD, fraction irréductible, entiers aléatoires
        // ================================================================
        function pgcd(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            while (b) {
                [a, b] = [b, a % b];
            }
            return a;
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randomNonZeroInt(min, max) {
            let n;
            do { n = randomInt(min, max); } while (n === 0);
            return n;
        }

        function randomIrreducibleFraction() {
            let num, den, g;
            do {
                num = randomNonZeroInt(-100, 100);
                den = randomInt(2, 100);
                g = pgcd(num, den);
            } while (g !== 1);
            return { num: num, den: den };
        }

        // ================================================================
        //  NŒUD D'EXPRESSION
        // ================================================================
        function Node(type, value, left, right, op) {
            this.type = type; // 'integer', 'fraction', 'op'
            this.value = value || null; // {num, den}
            this.left = left || null;
            this.right = right || null;
            this.op = op || null;
        }

        // ================================================================
        //  GÉNÉRATION D'ARBRES SELON LE NIVEAU
        // ================================================================

        function randomLeaf(type) {
            if (type === 'integer') {
                return new Node('integer', { num: randomNonZeroInt(-100, 100), den: 1 });
            } else {
                const f = randomIrreducibleFraction();
                return new Node('fraction', { num: f.num, den: f.den });
            }
        }

        function buildTreeWithLeafTypes(opsCount, leafTypes) {
            if (opsCount === 0) {
                if (leafTypes.length !== 1) throw new Error("Il faut exactement une feuille");
                return randomLeaf(leafTypes[0]);
            }
            const ops = ['+', '-', '*', '/'];
            const op = ops[randomInt(0, 3)];
            let leftOps = randomInt(0, opsCount - 1);
            let rightOps = opsCount - 1 - leftOps;
            const leftLeavesCount = leftOps + 1;
            const rightLeavesCount = rightOps + 1;

            const shuffled = [...leafTypes];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = randomInt(0, i);
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const leftTypes = shuffled.slice(0, leftLeavesCount);
            const rightTypes = shuffled.slice(leftLeavesCount);

            const left = buildTreeWithLeafTypes(leftOps, leftTypes);
            const right = buildTreeWithLeafTypes(rightOps, rightTypes);

            return new Node('op', null, left, right, op);
        }

        function generateLevel1() {
            const leftIsInt = Math.random() < 0.5;
            const types = leftIsInt ? ['integer', 'fraction'] : ['fraction', 'integer'];
            return buildTreeWithLeafTypes(1, types);
        }

        function generateLevel2() {
            const types = ['integer', 'integer', 'fraction'];
            for (let i = types.length - 1; i > 0; i--) {
                const j = randomInt(0, i);
                [types[i], types[j]] = [types[j], types[i]];
            }
            return buildTreeWithLeafTypes(2, types);
        }

        function generateLevel3() {
            const types = ['fraction', 'fraction', 'integer'];
            for (let i = types.length - 1; i > 0; i--) {
                const j = randomInt(0, i);
                [types[i], types[j]] = [types[j], types[i]];
            }
            return buildTreeWithLeafTypes(2, types);
        }

        function generateLevel4() {
            const leftGrouped = Math.random() < 0.5;
            const fracs = [randomIrreducibleFraction(), randomIrreducibleFraction(), randomIrreducibleFraction()];
            const f1 = new Node('fraction', { num: fracs[0].num, den: fracs[0].den });
            const f2 = new Node('fraction', { num: fracs[1].num, den: fracs[1].den });
            const f3 = new Node('fraction', { num: fracs[2].num, den: fracs[2].den });

            const ops = ['+', '-', '*', '/'];
            const opInt = ops[randomInt(0, 3)];
            const opRoot = ops[randomInt(0, 3)];

            let root;
            if (leftGrouped) {
                const group = new Node('op', null, f1, f2, opInt);
                root = new Node('op', null, group, f3, opRoot);
            } else {
                const group = new Node('op', null, f2, f3, opInt);
                root = new Node('op', null, f1, group, opRoot);
            }
            return root;
        }

        function generateExpressionForLevel(level) {
            let root;
            let attempts = 0;
            do {
                attempts++;
                switch (level) {
                    case 1:
                        root = generateLevel1();
                        break;
                    case 2:
                        root = generateLevel2();
                        break;
                    case 3:
                        root = generateLevel3();
                        break;
                    case 4:
                        root = generateLevel4();
                        break;
                    default:
                        root = generateLevel1();
                }
                const result = evaluate(root);
                if (result.num === 0) continue;
                if (Math.abs(result.num) > 1000 || Math.abs(result.den) > 1000) continue;
                const latex = toLatexRaw(root);
                if (hasConsecutiveOperators(latex)) continue;
                if (level === 4) {
                    const display = toLatexRaw(root);
                    if (!display.includes('\\left(') && !display.includes('(')) {
                        continue;
                    }
                }
                break;
            } while (attempts < 200);
            return root;
        }

        // ================================================================
        //  ÉVALUATION
        // ================================================================
        function evaluate(node) {
            if (node.type === 'integer' || node.type === 'fraction') {
                return { num: node.value.num, den: node.value.den || 1 };
            }
            const leftVal = evaluate(node.left);
            const rightVal = evaluate(node.right);
            let num, den;
            switch (node.op) {
                case '+':
                    num = leftVal.num * rightVal.den + rightVal.num * leftVal.den;
                    den = leftVal.den * rightVal.den;
                    break;
                case '-':
                    num = leftVal.num * rightVal.den - rightVal.num * leftVal.den;
                    den = leftVal.den * rightVal.den;
                    break;
                case '*':
                    num = leftVal.num * rightVal.num;
                    den = leftVal.den * rightVal.den;
                    break;
                case '/':
                    num = leftVal.num * rightVal.den;
                    den = leftVal.den * rightVal.num;
                    break;
            }
            const g = pgcd(num, den);
            num /= g;
            den /= g;
            if (den < 0) { num = -num;
                den = -den; }
            return { num, den };
        }

        // ================================================================
        //  CONVERSION LaTeX
        // ================================================================
        function toLatexRaw(node) {
            if (node.type === 'integer') {
                return `${node.value.num}`;
            }
            if (node.type === 'fraction') {
                return `\\dfrac{${node.value.num}}{${node.value.den}}`;
            }
            const left = toLatexRaw(node.left);
            const right = toLatexRaw(node.right);
            let op = node.op;
            if (op === '*') op = '\\times';
            if (op === '/') op = '\\div';
            let leftStr = left;
            let rightStr = right;
            const leftPrio = getPriority(node.op);
            const rightPrio = getPriority(node.op);
            if (node.left.type === 'op' && getPriority(node.left.op) < leftPrio) {
                leftStr = '\\left(' + leftStr + '\\right)';
            }
            if (node.right.type === 'op' && getPriority(node.right.op) < rightPrio) {
                rightStr = '\\left(' + rightStr + '\\right)';
            }
            if (node.op === '-' && node.right.type === 'op') {
                rightStr = '\\left(' + rightStr + '\\right)';
            }
            return leftStr + ' ' + op + ' ' + rightStr;
        }

        function getPriority(op) {
            if (op === '+' || op === '-') return 1;
            if (op === '*' || op === '/') return 2;
            return 0;
        }

        function hasConsecutiveOperators(tex) {
            let clean = tex.replace(/\\left\([^)]*\)/g, ' ').replace(/\([^)]*\)/g, ' ');
            clean = clean.replace(/\\dfrac\{[^}]*\}\{[^}]*\}/g, ' ');
            const patterns = [/\\times\s*\-/, /\\div\s*\-/, /\+\s*\-/, /\-\s*\-/, /\*\s*\-/, /\/\s*\-/];
            for (let p of patterns) {
                if (p.test(clean)) return true;
            }
            return false;
        }

        // ================================================================
        //  DISTRACTEURS
        // ================================================================
        function generateDistractors(correctNum, correctDen, count) {
            const distractors = [];
            const used = new Set();
            used.add(`${correctNum}/${correctDen}`);

            let attempts = 0;
            while (distractors.length < count && attempts < 300) {
                attempts++;
                let num = correctNum;
                let den = correctDen;
                const mod = randomInt(1, 7);
                switch (mod) {
                    case 1:
                        num = -num;
                        break;
                    case 2:
                        num += (Math.random() < 0.5 ? 1 : -1) * randomInt(1, 5);
                        break;
                    case 3:
                        den += (Math.random() < 0.5 ? 1 : -1) * randomInt(1, 5);
                        if (den === 0) den = 1;
                        break;
                    case 4:
                        num = randomNonZeroInt(-100, 100);
                        break;
                    case 5:
                        den = randomInt(2, 100);
                        break;
                    case 6:
                        [num, den] = [den, num];
                        break;
                    case 7:
                        num = randomNonZeroInt(-100, 100);
                        den = randomInt(2, 100);
                        break;
                }
                const g = pgcd(num, den);
                num /= g;
                den /= g;
                if (den < 0) { num = -num;
                    den = -den; }
                const key = `${num}/${den}`;
                if (!used.has(key) && !(num === correctNum && den === correctDen)) {
                    used.add(key);
                    distractors.push({ num, den });
                }
            }
            while (distractors.length < count) {
                let num = randomNonZeroInt(-100, 100);
                let den = randomInt(2, 100);
                const g = pgcd(num, den);
                num /= g;
                den /= g;
                if (den < 0) { num = -num;
                    den = -den; }
                const key = `${num}/${den}`;
                if (!used.has(key)) {
                    used.add(key);
                    distractors.push({ num, den });
                }
            }
            return distractors;
        }

        // ================================================================
        //  GÉNÉRATION DE LA QUESTION COMPLÈTE
        // ================================================================
        function generateQuestion(level) {
            let attempts = 0;
            while (attempts < 100) {
                attempts++;
                const root = generateExpressionForLevel(level);
                const rawLatex = toLatexRaw(root);
                const result = evaluate(root);
                if (result.num === 0) continue;
                if (Math.abs(result.num) > 1000 || Math.abs(result.den) > 1000) continue;

                const correctNum = result.num;
                const correctDen = result.den;

                const otherIsCorrect = (randomInt(1, 10) === 1);
                let answers = [];

                if (otherIsCorrect) {
                    const distractors = generateDistractors(correctNum, correctDen, 4);
                    for (let d of distractors) {
                        answers.push({ num: d.num, den: d.den, isOther: false, correct: false });
                    }
                    answers.push({ num: null, den: null, isOther: true, correct: true });
                } else {
                    const distractors = generateDistractors(correctNum, correctDen, 3);
                    const correctPos = randomInt(0, 3);
                    let exprIndex = 0;
                    for (let i = 0; i < 4; i++) {
                        if (i === correctPos) {
                            answers.push({ num: correctNum, den: correctDen, isOther: false, correct: true });
                        } else {
                            const d = distractors[exprIndex++];
                            answers.push({ num: d.num, den: d.den, isOther: false, correct: false });
                        }
                    }
                    answers.push({ num: null, den: null, isOther: true, correct: false });
                }

                return {
                    rawLatex: rawLatex,
                    answers: answers,
                    correctNum: correctNum,
                    correctDen: correctDen,
                    otherIsCorrect: otherIsCorrect
                };
            }
            return generateQuestion(level);
        }

        // ================================================================
        //  ÉTAT GLOBAL
        // ================================================================
        const state = {
            currentLevel: 1,
            currentQuestion: null,
            answers: [],
            correctIndex: -1,
            selectedIndex: -1,
            submitted: false,
            stats: { successes: 0, errors: 0, total: 0 },
            history: [],
            // Niveaux : 1 à 4, chaque niveau stocke un tableau des 10 derniers résultats (booléens)
            levelHistory: {
                1: [],
                2: [],
                3: [],
                4: []
            },
            unlockedLevels: [true, false, false, false] // index 0 = niveau 1
        };

        // ================================================================
        //  GESTION DES NIVEAUX ET DÉVERROUILLAGE
        // ================================================================
        function getSuccessRate(level) {
            const hist = state.levelHistory[level] || [];
            if (hist.length === 0) return 0;
            const recent = hist.slice(-10); // les 10 dernières
            const success = recent.filter(x => x === true).length;
            return success / recent.length;
        }

        function updateUnlockedLevels() {
            // Niveau 1 toujours débloqué
            state.unlockedLevels[0] = true;
            for (let i = 1; i < 4; i++) {
                // Niveau i débloqué si niveau i-1 a un taux >= 0.8 sur les 10 dernières
                const prevRate = getSuccessRate(i);
                state.unlockedLevels[i] = (prevRate >= 0.8);
            }
            // Si le niveau 4 est débloqué, on affiche un message
            if (state.unlockedLevels[3]) {
                document.getElementById('unlockMessage').classList.add('show');
                document.getElementById('unlockMessage').textContent = '🎉 Tous les niveaux sont débloqués ! Félicitations !';
            } else {
                // Vérifier si un niveau vient d'être débloqué
                for (let i = 1; i < 4; i++) {
                    if (state.unlockedLevels[i] && !state._prevUnlocked?.[i]) {
                        document.getElementById('unlockMessage').classList.add('show');
                        document.getElementById('unlockMessage').textContent = `🎉 Niveau ${i+1} débloqué !`;
                        break;
                    }
                }
            }
            // Sauvegarder l'état précédent pour détecter les nouveaux débloquages
            state._prevUnlocked = [...state.unlockedLevels];
            // Mettre à jour les boutons
            updateLevelButtons();
        }

        function updateLevelButtons() {
            document.querySelectorAll('.level-btn').forEach(btn => {
                const lvl = parseInt(btn.dataset.level);
                const unlocked = state.unlockedLevels[lvl - 1];
                btn.disabled = !unlocked;
                // Mettre à jour l'icône
                const iconSpan = btn.querySelector('.lock-icon');
                if (iconSpan) {
                    iconSpan.textContent = unlocked ? '' : '🔒';
                }
                // Mettre à jour l'infobulle
                let tooltip = btn.querySelector('.tooltip');
                if (!unlocked) {
                    if (!tooltip) {
                        tooltip = document.createElement('span');
                        tooltip.className = 'tooltip';
                        btn.appendChild(tooltip);
                    }
                    const prevLevel = lvl - 1;
                    const rate = getSuccessRate(prevLevel);
                    const percent = Math.round(rate * 100);
                    tooltip.textContent = `Niveau ${prevLevel} : ${percent}% (80% requis)`;
                } else {
                    if (tooltip) tooltip.remove();
                }
                // Activer le bouton si c'est le niveau courant
                btn.classList.toggle('active', lvl === state.currentLevel && unlocked);
            });
        }

        // ================================================================
        //  RENDU
        // ================================================================
        function renderQuestion() {
            const el = document.getElementById('expressionLatex');
            el.textContent = `\\(${state.currentQuestion.rawLatex}\\)`;
            renderMath();
        }

        function renderAnswers() {
            const container = document.getElementById('answersContainer');
            container.innerHTML = '';
            state.answers.forEach((ans, idx) => {
                const div = document.createElement('div');
                div.className = 'answer-option';
                div.dataset.index = idx;

                const radio = document.createElement('span');
                radio.className = 'radio';

                const label = document.createElement('span');
                label.className = 'label';
                if (ans.isOther) {
                    label.innerHTML = `<span class="other-label">Autre</span>`;
                } else {
                    let display;
                    if (ans.den === 1) {
                        display = `${ans.num}`;
                    } else {
                        display = `\\dfrac{${ans.num}}{${ans.den}}`;
                    }
                    label.innerHTML = `<span class="math">\\(${display}\\)</span>`;
                }

                const check = document.createElement('span');
                check.className = 'check-mark';

                div.appendChild(radio);
                div.appendChild(label);
                div.appendChild(check);

                if (state.selectedIndex === idx) div.classList.add('selected');

                div.addEventListener('click', () => onAnswerClick(idx));
                container.appendChild(div);
            });
            renderMath();
        }

        function renderMath() {
            if (!window.MathJax || !MathJax.typesetPromise) {
                setTimeout(renderMath, 200);
                return;
            }
            MathJax.typesetPromise().catch(() => {});
        }

        function updateStatsDisplay() {
            document.getElementById('successCount').textContent = state.stats.successes;
            document.getElementById('errorCount').textContent = state.stats.errors;
            document.getElementById('totalCount').textContent = state.stats.total;
        }

        function clearFeedback() {
            document.getElementById('feedback').classList.remove('visible');
        }

        function showFeedback(isCorrect, explanationHtml) {
            const fb = document.getElementById('feedback');
            const resultDiv = document.getElementById('resultDisplay');
            const icon = document.getElementById('resultIcon');
            const text = document.getElementById('resultText');
            const expl = document.getElementById('explanationText');

            fb.classList.add('visible');
            if (isCorrect) {
                resultDiv.className = 'result correct';
                icon.textContent = '✅';
                text.textContent = 'Correct !';
            } else {
                resultDiv.className = 'result incorrect';
                icon.textContent = '❌';
                text.textContent = 'Incorrect. Voici le résultat correct :';
            }
            expl.innerHTML = explanationHtml;
            renderMath();
        }

        function buildExplanation(correctNum, correctDen, selectedNum, selectedDen, isCorrect, otherIsCorrect) {
            let html = '';
            html += `<div class="step">📐 Expression initiale :</div>`;
            html += `<div class="detail">\\(${state.currentQuestion.rawLatex}\\)</div>`;
            html += `<div class="step">✅ Résultat correct :</div>`;
            if (otherIsCorrect) {
                html += `<div class="detail"><strong>Autre</strong> (aucune des propositions n'était correcte)</div>`;
            } else {
                let display;
                if (correctDen === 1) display = `${correctNum}`;
                else display = `\\dfrac{${correctNum}}{${correctDen}}`;
                html += `<div class="detail">\\(${display}\\)</div>`;
            }

            if (!isCorrect) {
                html += `<div class="step" style="color:#b91c1c;">❌ Votre choix :</div>`;
                if (selectedNum === null) {
                    html += `<div class="detail"><strong>Autre</strong></div>`;
                } else {
                    let display;
                    if (selectedDen === 1) display = `${selectedNum}`;
                    else display = `\\dfrac{${selectedNum}}{${selectedDen}}`;
                    html += `<div class="detail">\\(${display}\\)</div>`;
                }
            }
            return html;
        }

        // ================================================================
        //  INTERACTIONS
        // ================================================================
        function onAnswerClick(index) {
            if (state.submitted) return;
            state.selectedIndex = index;
            document.querySelectorAll('.answer-option').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
            document.getElementById('submitBtn').disabled = false;
        }

        function onSubmit() {
            if (state.submitted) return;
            if (state.selectedIndex === -1) {
                alert('Veuillez sélectionner une réponse.');
                return;
            }

            const selected = state.answers[state.selectedIndex];
            const isCorrect = selected.correct;

            // Mettre à jour les stats globales
            state.stats.total++;
            if (isCorrect) state.stats.successes++;
            else state.stats.errors++;
            updateStatsDisplay();

            // Mettre à jour l'historique du niveau courant
            const lvl = state.currentLevel;
            if (!state.levelHistory[lvl]) state.levelHistory[lvl] = [];
            state.levelHistory[lvl].push(isCorrect);
            // Garder seulement les 10 dernières
            if (state.levelHistory[lvl].length > 10) {
                state.levelHistory[lvl].shift();
            }

            // Vérifier si le niveau suivant doit être débloqué
            updateUnlockedLevels();

            // Sauvegarder
            saveToLocalStorage();

            // Soumission
            const raw = state.currentQuestion.rawLatex;
            const cNum = state.currentQuestion.correctNum;
            const cDen = state.currentQuestion.correctDen;
            state.history.push({
                type: isCorrect ? 'success' : 'failure',
                expression: raw,
                correct: `${cNum}/${cDen}`,
                selected: selected.isOther ? 'Autre' : `${selected.num}/${selected.den}`
            });

            state.submitted = true;

            document.querySelectorAll('.answer-option').forEach((el, i) => {
                el.classList.add('disabled');
                const ans = state.answers[i];
                if (ans.correct) {
                    el.classList.add('correct-reveal');
                    el.querySelector('.check-mark').textContent = '✓';
                } else if (i === state.selectedIndex && !ans.correct) {
                    el.classList.add('wrong-reveal');
                    el.querySelector('.check-mark').textContent = '✗';
                }
                if (i === state.selectedIndex) el.classList.add('selected');
            });

            document.getElementById('submitBtn').disabled = true;

            const explanation = buildExplanation(
                cNum, cDen,
                selected.isOther ? null : selected.num,
                selected.isOther ? null : selected.den,
                isCorrect,
                state.currentQuestion.otherIsCorrect
            );
            showFeedback(isCorrect, explanation);
        }

        function onReset() {
            generateNewQuestion();
            document.getElementById('submitBtn').disabled = true;
            document.querySelectorAll('.answer-option').forEach(el => {
                el.classList.remove('disabled', 'correct-reveal', 'wrong-reveal', 'selected');
                el.querySelector('.check-mark').textContent = '';
            });
            clearFeedback();
            // Cacher le message de déblocage après reset
            document.getElementById('unlockMessage').classList.remove('show');
        }

        function changeLevel(level) {
            if (!state.unlockedLevels[level - 1]) {
                alert(`Le niveau ${level} est verrouillé. Vous devez obtenir au moins 80% de bonnes réponses sur les 10 dernières questions du niveau ${level-1}.`);
                return;
            }
            state.currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.level) === level);
            });
            document.getElementById('levelBadge').textContent = `Niveau ${level}`;
            onReset();
        }

        // ================================================================
        //  GÉNÉRATION D'UNE NOUVELLE QUESTION
        // ================================================================
        function generateNewQuestion() {
            const q = generateQuestion(state.currentLevel);
            state.currentQuestion = q;
            state.answers = q.answers.map((a, i) => ({ ...a, index: i }));
            state.correctIndex = state.answers.findIndex(a => a.correct);
            state.selectedIndex = -1;
            state.submitted = false;

            renderQuestion();
            renderAnswers();
            clearFeedback();
            updateStatsDisplay();
            // Mettre à jour les boutons (déjà fait par updateUnlockedLevels)
        }

        // ================================================================
        //  JSON (LOCAL STORAGE)
        // ================================================================
        function saveToLocalStorage() {
            try {
                const data = {
                    stats: state.stats,
                    history: state.history,
                    levelHistory: state.levelHistory,
                    unlockedLevels: state.unlockedLevels,
                    lastUpdated: new Date().toISOString()
                };
                localStorage.setItem('expressionQCM_progressive', JSON.stringify(data));
                updateJsonStatus('saved', 'Données sauvegardées dans le navigateur.');
            } catch (e) {
                updateJsonStatus('error', 'Erreur lors de la sauvegarde.');
            }
        }

        function loadFromLocalStorage() {
            try {
                const raw = localStorage.getItem('expressionQCM_progressive');
                if (!raw) { updateJsonStatus('empty', 'Aucune donnée trouvée.'); return; }
                const data = JSON.parse(raw);
                if (data.stats) state.stats = data.stats;
                if (data.history) state.history = data.history;
                if (data.levelHistory) state.levelHistory = data.levelHistory;
                if (data.unlockedLevels) state.unlockedLevels = data.unlockedLevels;
                updateStatsDisplay();
                updateUnlockedLevels();
                updateJsonStatus('loaded', `Données chargées : ${state.history.length} essais (${state.stats.successes} succès, ${state.stats.errors} échecs).`);
            } catch (e) {
                updateJsonStatus('error', 'Erreur lors du chargement des données.');
            }
        }

        function exportJSON() {
            const data = {
                stats: state.stats,
                history: state.history,
                levelHistory: state.levelHistory,
                unlockedLevels: state.unlockedLevels,
                exportedAt: new Date().toISOString()
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `qcm_progressive_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            updateJsonStatus('saved', 'Fichier JSON exporté avec succès.');
        }

        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.stats && data.history && data.levelHistory && data.unlockedLevels) {
                            state.stats = data.stats;
                            state.history = data.history;
                            state.levelHistory = data.levelHistory;
                            state.unlockedLevels = data.unlockedLevels;
                            updateStatsDisplay();
                            updateUnlockedLevels();
                            updateJsonStatus('loaded', `Données importées : ${state.history.length} essais.`);
                            saveToLocalStorage();
                        } else {
                            updateJsonStatus('error', 'Format JSON invalide (certains champs manquent).');
                        }
                    } catch (err) {
                        updateJsonStatus('error', 'Erreur lors de la lecture du fichier.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function updateJsonStatus(status, message) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            dot.className = 'dot';
            if (status === 'saved' || status === 'loaded') dot.classList.add('ok');
            else if (status === 'error') dot.classList.add('ko');
            else dot.classList.add('neutral');
            text.textContent = message;
        }

        // ================================================================
        //  INITIALISATION
        // ================================================================
        function init() {
            // Charger depuis localStorage
            try {
                const raw = localStorage.getItem('expressionQCM_progressive');
                if (raw) {
                    const data = JSON.parse(raw);
                    if (data.stats) state.stats = data.stats;
                    if (data.history) state.history = data.history;
                    if (data.levelHistory) state.levelHistory = data.levelHistory;
                    if (data.unlockedLevels) state.unlockedLevels = data.unlockedLevels;
                    updateStatsDisplay();
                    updateJsonStatus('loaded', `Données chargées : ${state.history.length} essais.`);
                } else {
                    updateJsonStatus('empty', 'Aucune donnée en mémoire.');
                }
            } catch (e) {
                updateJsonStatus('error', 'Erreur de chargement.');
            }

            // Initialiser les niveaux débloqués
            state._prevUnlocked = [...state.unlockedLevels];
            // S'assurer que le niveau 1 est débloqué
            state.unlockedLevels[0] = true;
            // Recalculer les déblocages
            updateUnlockedLevels();

            // Niveau par défaut : 1
            state.currentLevel = 1;
            document.querySelectorAll('.level-btn').forEach(btn => {
                const lvl = parseInt(btn.dataset.level);
                btn.addEventListener('click', () => {
                    changeLevel(lvl);
                });
            });
            document.getElementById('levelBadge').textContent = `Niveau ${state.currentLevel}`;

            generateNewQuestion();
            document.getElementById('submitBtn').disabled = true;

            document.getElementById('submitBtn').addEventListener('click', onSubmit);
            document.getElementById('resetBtn').addEventListener('click', onReset);
            document.getElementById('saveBtn').addEventListener('click', exportJSON);
            document.getElementById('loadBtn').addEventListener('click', importJSON);
        }

        window.addEventListener('load', init);
    </script>
</body>
