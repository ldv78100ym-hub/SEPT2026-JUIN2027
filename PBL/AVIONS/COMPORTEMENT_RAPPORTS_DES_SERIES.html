<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PBL Avion – Rédaction des rapports de série</title>

    <!-- MathJax (sans polyfill, strictement interdit) -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async>
    </script>

    <style>
        :root {
            --bg-main: #eceff1;
            --bg-card: #ffffff;
            --primary: #1565c0;
            --primary-light: #e3f2fd;
            --success: #2e7d32;
            --warning: #e67e22;
            --danger: #b71c1c;
            --border-radius: 16px;
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
            --text: #1a1a1a;
            --text-light: #555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-main);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            color: var(--primary);
            border-bottom: 3px double var(--primary);
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: normal;
            color: var(--text-light);
            margin-left: auto;
        }

        .upload-section {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px 28px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
        }
        .upload-section label {
            font-weight: 600;
            font-size: 1.05rem;
        }
        .upload-section input[type="file"] {
            flex: 1;
            min-width: 200px;
            padding: 10px 14px;
            border: 2px dashed #aaa;
            border-radius: 12px;
            background: #fafafa;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .upload-section input[type="file"]:hover {
            border-color: var(--primary);
        }
        .upload-section .file-status {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .upload-section .file-status strong {
            color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 22px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
            white-space: nowrap;
        }
        .btn:hover {
            transform: scale(1.02);
            background: #0d47a1;
        }
        .btn-success {
            background: var(--success);
        }
        .btn-success:hover {
            background: #1b5e20;
        }
        .btn-warning {
            background: var(--warning);
        }
        .btn-warning:hover {
            background: #b45f1b;
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-danger:hover {
            background: #880e0e;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 0.8rem;
            border-radius: 30px;
        }

        /* Stats */
        .stats-badge {
            display: inline-flex;
            gap: 16px;
            flex-wrap: wrap;
            background: #f5f5f5;
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 0.85rem;
        }
        .stats-badge .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stats-badge .stat-item .val {
            font-weight: 700;
        }
        .stats-badge .stat-item .val.ok {
            color: var(--success);
        }
        .stats-badge .stat-item .val.fail {
            color: var(--danger);
        }

        /* Séries */
        .series-list {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 20px;
        }

        .serie-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 24px 28px;
            border-left: 6px solid var(--primary);
            transition: 0.15s;
        }
        .serie-card:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.13);
        }

        .serie-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 12px 24px;
            margin-bottom: 14px;
        }
        .serie-header .num {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .serie-header .meta {
            color: var(--text-light);
            font-size: 0.95rem;
            display: flex;
            flex-wrap: wrap;
            gap: 6px 18px;
        }
        .serie-header .meta span {
            background: #f0f4f8;
            padding: 2px 14px;
            border-radius: 30px;
        }
        .serie-header .badge-ok {
            background: var(--success);
            color: white;
            padding: 2px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .serie-header .badge-fail {
            background: var(--danger);
            color: white;
            padding: 2px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Photos */
        .photos-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0 16px 0;
        }
        .photos-gallery .photo-thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: 0.1s;
        }
        .photos-gallery .photo-thumb:hover {
            transform: scale(1.04);
            border-color: var(--primary);
        }
        .photos-gallery .no-photo {
            color: #aaa;
            font-style: italic;
            font-size: 0.9rem;
            padding: 4px 0;
        }

        /* Statistiques */
        .serie-stats {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 18px;
            margin: 10px 0 16px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px 40px;
            font-size: 0.95rem;
            border: 1px solid #e9ecef;
        }
        .serie-stats .stat-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .serie-stats .stat-group .label {
            font-weight: 600;
            color: var(--text-light);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .serie-stats .stat-group .value {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .serie-stats .stat-group .value .highlight {
            color: var(--primary);
        }

        /* Rapport */
        .report-section {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 2px dashed #e0e0e0;
        }
        .report-section .report-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-light);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .report-section .report-title .badge-report {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 700px) {
            .report-grid {
                grid-template-columns: 1fr;
            }
        }

        .report-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .report-field label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .report-field textarea {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1.5px solid #d0d7de;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            transition: 0.15s;
            background: #fcfcfc;
            width: 100%;
        }
        .report-field textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.15);
            background: white;
        }
        .report-field .char-count {
            font-size: 0.75rem;
            color: #aaa;
            text-align: right;
            padding-right: 6px;
        }

        .report-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
            align-items: center;
        }
        .report-actions .saved-indicator {
            font-size: 0.85rem;
            color: var(--success);
            font-weight: 500;
            display: none;
        }
        .report-actions .saved-indicator.show {
            display: inline;
        }

        /* Modal photo */
        .modal {
            visibility: hidden;
            opacity: 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 2rem;
            cursor: pointer;
            color: #555;
            transition: 0.1s;
            background: none;
            border: none;
            line-height: 1;
        }
        .modal-close:hover {
            color: var(--danger);
            transform: scale(1.1);
        }
        .modal .modal-label {
            display: block;
            text-align: center;
            font-weight: 600;
            color: var(--text-light);
            margin-top: 8px;
        }

        /* Export */
        .export-section {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 20px 28px;
            box-shadow: var(--shadow);
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
        }
        .export-section .info {
            font-size: 0.95rem;
            color: var(--text-light);
        }
        .export-section .info strong {
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        .empty-state h2 {
            font-weight: 400;
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            z-index: 9999;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.35s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }

        /* LaTeX inline rendering */
        .latex-block {
            background: #f8f9fa;
            padding: 8px 16px;
            border-radius: 8px;
            margin: 6px 0;
            border-left: 4px solid var(--primary-light);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .serie-card {
                padding: 16px;
            }
            .serie-header .num {
                font-size: 1.2rem;
            }
            .upload-section {
                flex-direction: column;
                align-items: stretch;
            }
            .report-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                text-align: center;
                padding: 10px 16px;
            }
            .photos-gallery .photo-thumb {
                width: 60px;
                height: 60px;
            }
        }

        /* Print / export styles */
        @media print {
            .upload-section,
            .export-section,
            .report-actions .btn {
                display: none !important;
            }
            .serie-card {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
            .report-field textarea {
                border: 1px solid #ccc;
                background: white;
                min-height: 60px;
            }
            .modal {
                display: none !important;
            }
            .toast {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            ✈️ Rédaction des rapports de série
            <small>PBL Avion en Papier</small>
        </h1>

        <!-- Upload -->
        <div class="upload-section" id="uploadSection">
            <label for="jsonUpload">📂 Importer le JSON :</label>
            <input type="file" id="jsonUpload" accept=".json">
            <span class="file-status" id="fileStatus">Aucun fichier chargé</span>
            <button class="btn btn-outline btn-sm" id="clearDataBtn">🗑️ Effacer les données</button>
        </div>

        <!-- Container des séries -->
        <div id="seriesContainer">
            <div class="empty-state" id="emptyState">
                <div class="icon">📤</div>
                <h2>Chargez un fichier JSON pour commencer</h2>
                <p style="color:#aaa; font-size:0.95rem;">Exportez depuis l'outil d'analyse comportementale.</p>
            </div>
            <div class="series-list" id="seriesList" style="display:none;"></div>
        </div>

        <!-- Export -->
        <div class="export-section" id="exportSection" style="display:none;">
            <span class="info">📋 <strong id="reportCount">0</strong> rapport(s) rédigé(s) sur <strong id="totalSeries">0</strong> série(s)</span>
            <div style="display:flex; flex-wrap:wrap; gap:10px; margin-left:auto;">
                <button class="btn btn-success" id="exportReportsBtn">📥 Exporter les rapports (JSON)</button>
                <button class="btn btn-warning" id="exportHtmlBtn">🖨️ Exporter en HTML</button>
                <button class="btn btn-outline" id="printBtn">🖨️ Imprimer</button>
            </div>
        </div>
    </div>

    <!-- Modal photo -->
    <div class="modal" id="photoModal">
        <div class="modal-content">
            <button class="modal-close" id="photoModalClose">&times;</button>
            <img id="photoModalImg" src="" alt="Photo">
            <span class="modal-label" id="photoModalLabel"></span>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  ÉTAT
        // ============================================================
        let seriesData = []; // tableau des séries (tel que lu depuis le JSON)
        let reports = {}; // { "serieNum": { modified: "...", reasons: "...", effects: "..." } }
        let currentFile = null;

        // ============================================================
        //  DOM refs
        // ============================================================
        const jsonUpload = document.getElementById('jsonUpload');
        const fileStatus = document.getElementById('fileStatus');
        const seriesList = document.getElementById('seriesList');
        const emptyState = document.getElementById('emptyState');
        const exportSection = document.getElementById('exportSection');
        const reportCount = document.getElementById('reportCount');
        const totalSeries = document.getElementById('totalSeries');
        const clearDataBtn = document.getElementById('clearDataBtn');
        const exportReportsBtn = document.getElementById('exportReportsBtn');
        const exportHtmlBtn = document.getElementById('exportHtmlBtn');
        const printBtn = document.getElementById('printBtn');

        const photoModal = document.getElementById('photoModal');
        const photoModalImg = document.getElementById('photoModalImg');
        const photoModalLabel = document.getElementById('photoModalLabel');
        const photoModalClose = document.getElementById('photoModalClose');

        const toastEl = document.getElementById('toast');

        // ============================================================
        //  TOAST
        // ============================================================
        let toastTimer = null;

        function showToast(msg, duration = 2500) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        // ============================================================
        //  GESTION DU STOCKAGE LOCAL
        // ============================================================
        function loadReportsFromStorage() {
            try {
                const stored = localStorage.getItem('pbl_reports_v1');
                if (stored) {
                    reports = JSON.parse(stored);
                    if (typeof reports !== 'object' || Array.isArray(reports)) reports = {};
                }
            } catch (_) { reports = {}; }
        }

        function saveReportsToStorage() {
            try {
                localStorage.setItem('pbl_reports_v1', JSON.stringify(reports));
            } catch (_) {}
        }

        // ============================================================
        //  CHARGEMENT JSON
        // ============================================================
        function loadJSON(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data) || data.length === 0) {
                        showToast('❌ Le fichier JSON doit contenir un tableau non vide de séries.', 3000);
                        return;
                    }
                    // Validation basique
                    const first = data[0];
                    if (!first.numero || !first.observations || !first.interpretation) {
                        showToast('❌ Structure JSON invalide : champs "numero", "observations" ou "interpretation" manquants.', 3000);
                        return;
                    }
                    seriesData = data;
                    currentFile = file.name;
                    fileStatus.innerHTML = `✅ <strong>${seriesData.length}</strong> série(s) chargée(s) depuis <strong>${file.name}</strong>`;
                    renderAll();
                    showToast(`✅ ${seriesData.length} série(s) chargée(s) avec succès.`, 2000);
                } catch (err) {
                    showToast('❌ Erreur de lecture JSON : ' + err.message, 3500);
                }
            };
            reader.onerror = function() {
                showToast('❌ Erreur lors de la lecture du fichier.', 3000);
            };
            reader.readAsText(file);
        }

        // ============================================================
        //  RENDU
        // ============================================================
        function renderAll() {
            if (!seriesData || seriesData.length === 0) {
                seriesList.style.display = 'none';
                emptyState.style.display = 'block';
                exportSection.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            seriesList.style.display = 'block';
            exportSection.style.display = 'flex';

            // Trier par numéro croissant
            const sorted = [...seriesData].sort((a, b) => a.numero - b.numero);

            let html = '';
            let reportCountVal = 0;

            for (const serie of sorted) {
                const num = serie.numero;
                const report = reports[num] || { modified: '', reasons: '', effects: '' };
                const hasReport = report.modified || report.reasons || report.effects;
                if (hasReport) reportCountVal++;

                const valid = serie.interpretation && serie.interpretation.volNormal;
                const dirPct = serie.interpretation ? serie.interpretation.dirPct['tout droit'] : 0;
                const tangPct = serie.interpretation ? serie.interpretation.tangPct.neutre : 0;

                // Photos
                const photos = serie.photos || {};
                const photoEntries = Object.entries(photos).filter(([_, v]) => v);

                html += `
                <div class="serie-card" data-serie="${num}">
                    <div class="serie-header">
                        <span class="num">#${num}</span>
                        <span class="meta">
                            <span>📅 ${serie.date || '—'}</span>
                            <span>🏷️ ${serie.equipe || '—'}</span>
                            <span>🔧 ${serie.modele || '—'}</span>
                            <span>📊 ${serie.nbEssais || 0} essais</span>
                        </span>
                        ${valid ? '<span class="badge-ok">✅ OK</span>' : '<span class="badge-fail">❌ À améliorer</span>'}
                    </div>

                    <div class="photos-gallery">
                        ${photoEntries.length > 0 ? photoEntries.map(([key, dataUrl]) => `
                            <img class="photo-thumb" src="${dataUrl}" alt="${key}" 
                                 data-label="${key}" data-full="${dataUrl}"
                                 onclick="openPhotoModal(this.dataset.full, this.dataset.label)">
                        `).join('') : '<span class="no-photo">📷 Aucune photo enregistrée pour cette série.</span>'}
                    </div>

                    <div class="serie-stats">
                        <div class="stat-group">
                            <span class="label">Direction</span>
                            <span class="value">Gauche ${(serie.interpretation?.dirPct?.gauche || 0).toFixed(1)}% &nbsp;|&nbsp; 
                            <span class="highlight">Tout droit ${dirPct.toFixed(1)}%</span> &nbsp;|&nbsp; 
                            Droite ${(serie.interpretation?.dirPct?.droite || 0).toFixed(1)}%</span>
                        </div>
                        <div class="stat-group">
                            <span class="label">Tangage</span>
                            <span class="value">Pique ${(serie.interpretation?.tangPct?.pique || 0).toFixed(1)}% &nbsp;|&nbsp; 
                            <span class="highlight">Neutre ${tangPct.toFixed(1)}%</span> &nbsp;|&nbsp; 
                            Cabre ${(serie.interpretation?.tangPct?.cabre || 0).toFixed(1)}%</span>
                        </div>
                        <div class="stat-group">
                            <span class="label">Seuil d'acceptabilité</span>
                            <span class="value">≥ ${serie.interpretation?.seuilAccept || 60}% tout droit &amp; ≥ ${serie.interpretation?.seuilAccept || 60}% neutre</span>
                        </div>
                    </div>

                    <div class="report-section">
                        <div class="report-title">
                            📝 Rapport de la série #${num}
                            <span class="badge-report">${hasReport ? '✅ Rédigé' : 'À compléter'}</span>
                        </div>

                        <div class="report-grid">
                            <div class="report-field">
                                <label for="modified_${num}">🔧 1. Qu'avez-vous modifié ?</label>
                                <textarea id="modified_${num}" rows="3" 
                                    placeholder="Décrivez précisément les modifications apportées (lestage, pli, symétrie, réglages, etc.)">${escapeHtml(report.modified || '')}</textarea>
                                <span class="char-count" id="modified_count_${num}">0 caractères</span>
                            </div>
                            <div class="report-field">
                                <label for="reasons_${num}">❓ 2. Pourquoi ces modifications ?</label>
                                <textarea id="reasons_${num}" rows="3" 
                                    placeholder="Expliquez votre stratégie, vos hypothèses, ce que vous cherchiez à améliorer.">${escapeHtml(report.reasons || '')}</textarea>
                                <span class="char-count" id="reasons_count_${num}">0 caractères</span>
                            </div>
                            <div class="report-field" style="grid-column: 1 / -1;">
                                <label for="effects_${num}">📈 3. Quels ont été les effets observés ?</label>
                                <textarea id="effects_${num}" rows="3" 
                                    placeholder="Décrivez les changements constatés dans le vol (direction, tangage, stabilité, etc.). Comparez avec la série précédente si possible.">${escapeHtml(report.effects || '')}</textarea>
                                <span class="char-count" id="effects_count_${num}">0 caractères</span>
                            </div>
                        </div>

                        <div class="report-actions">
                            <button class="btn btn-success btn-sm" onclick="saveReport(${num})">💾 Sauvegarder le rapport</button>
                            <span class="saved-indicator" id="saved_${num}">✅ Sauvegardé</span>
                            <span style="margin-left:auto; font-size:0.8rem; color:#aaa;" id="lastSave_${num}"></span>
                        </div>
                    </div>
                </div>
                `;
            }

            seriesList.innerHTML = html;
            totalSeries.textContent = seriesData.length;
            reportCount.textContent = reportCountVal;

            // Activer les compteurs de caractères
            for (const serie of sorted) {
                const num = serie.numero;
                attachCharCounter(`modified_${num}`, `modified_count_${num}`);
                attachCharCounter(`reasons_${num}`, `reasons_count_${num}`);
                attachCharCounter(`effects_${num}`, `effects_count_${num}`);
                // Restaurer l'indicateur de sauvegarde
                const saved = document.getElementById(`saved_${num}`);
                const report = reports[num];
                if (report && (report.modified || report.reasons || report.effects)) {
                    saved.classList.add('show');
                }
                // Date de dernière sauvegarde
                const lastSave = document.getElementById(`lastSave_${num}`);
                if (report && report._savedAt) {
                    const d = new Date(report._savedAt);
                    lastSave.textContent = `Dernière sauvegarde : ${d.toLocaleString()}`;
                } else {
                    lastSave.textContent = '';
                }
            }

            // Re-rendre les formules MathJax si présentes
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise().catch(() => {});
            }
        }

        // ============================================================
        //  UTILITAIRES
        // ============================================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;')
                .replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function unescapeHtml(str) {
            if (!str) return '';
            return str.replace(/&amp;/g, '&').replace(/&quot;/g, '"')
                .replace(/&lt;/g, '<').replace(/&gt;/g, '>');
        }

        function attachCharCounter(textareaId, countId) {
            const ta = document.getElementById(textareaId);
            const counter = document.getElementById(countId);
            if (!ta || !counter) return;
            const update = () => {
                counter.textContent = ta.value.length + ' caractères';
            };
            ta.addEventListener('input', update);
            update();
        }

        // ============================================================
        //  SAUVEGARDE D'UN RAPPORT
        // ============================================================
        function saveReport(num) {
            const modified = document.getElementById(`modified_${num}`).value.trim();
            const reasons = document.getElementById(`reasons_${num}`).value.trim();
            const effects = document.getElementById(`effects_${num}`).value.trim();

            // Vérifier qu'au moins un champ est rempli
            if (!modified && !reasons && !effects) {
                showToast('⚠️ Remplissez au moins un champ avant de sauvegarder.', 2500);
                return;
            }

            reports[num] = {
                modified: modified,
                reasons: reasons,
                effects: effects,
                _savedAt: new Date().toISOString()
            };

            saveReportsToStorage();

            const saved = document.getElementById(`saved_${num}`);
            saved.classList.add('show');
            setTimeout(() => saved.classList.remove('show'), 3000);

            const lastSave = document.getElementById(`lastSave_${num}`);
            const d = new Date();
            lastSave.textContent = `Dernière sauvegarde : ${d.toLocaleString()}`;

            // Mettre à jour le compteur de rapports
            updateReportCount();
            showToast(`✅ Rapport de la série #${num} sauvegardé.`, 2000);
        }

        function updateReportCount() {
            let count = 0;
            for (const serie of seriesData) {
                const r = reports[serie.numero];
                if (r && (r.modified || r.reasons || r.effects)) count++;
            }
            reportCount.textContent = count;
            // Mettre à jour les badges
            for (const serie of seriesData) {
                const num = serie.numero;
                const badge = document.querySelector(`.serie-card[data-serie="${num}"] .badge-report`);
                if (badge) {
                    const r = reports[num];
                    const has = r && (r.modified || r.reasons || r.effects);
                    badge.textContent = has ? '✅ Rédigé' : 'À compléter';
                    badge.style.background = has ? '#d4edda' : '#f8f9fa';
                    badge.style.color = has ? '#155724' : '#6c757d';
                }
            }
        }

        // ============================================================
        //  EXPORT DES RAPPORTS (JSON)
        // ============================================================
        function exportReportsJSON() {
            if (seriesData.length === 0) {
                showToast('⚠️ Aucune série chargée.', 2000);
                return;
            }

            // Construire un objet complet avec les données des séries + rapports
            const exportData = {
                exportedAt: new Date().toISOString(),
                series: seriesData.map(s => {
                    const num = s.numero;
                    const report = reports[num] || { modified: '', reasons: '', effects: '' };
                    return {
                        numero: num,
                        date: s.date,
                        equipe: s.equipe,
                        modele: s.modele,
                        nbEssais: s.nbEssais,
                        interpretation: s.interpretation,
                        // on ne garde pas les photos dans l'export pour réduire la taille
                        // mais on garde une référence
                        hasPhotos: s.photos && Object.values(s.photos).some(v => v),
                        report: {
                            modified: report.modified || '',
                            reasons: report.reasons || '',
                            effects: report.effects || '',
                            savedAt: report._savedAt || null
                        }
                    };
                })
            };

            const json = JSON.stringify(exportData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toISOString().slice(0, 10);
            const teamName = seriesData[0]?.equipe?.trim() || 'equipe';
            const sanitized = teamName.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '_').replace(
                /[^a-zA-Z0-9_-]/g, '');
            a.download = `${sanitized}_rapports_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`📥 ${exportData.series.length} rapport(s) exporté(s) en JSON.`, 2500);
        }

        // ============================================================
        //  EXPORT EN HTML (pour impression / partage)
        // ============================================================
        function exportHTML() {
            if (seriesData.length === 0) {
                showToast('⚠️ Aucune série chargée.', 2000);
                return;
            }

            const sorted = [...seriesData].sort((a, b) => a.numero - b.numero);

            let htmlContent = `
            <!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><title>Rapports PBL Avion</title>
            <style>
                body { font-family: 'Segoe UI', Roboto, sans-serif; max-width: 1100px; margin: 30px auto; padding: 20px; background: #fff; color: #1a1a1a; }
                h1 { color: #1565c0; border-bottom: 3px double #1565c0; padding-bottom: 8px; }
                .serie { border: 1px solid #ddd; border-radius: 16px; padding: 20px 24px; margin-bottom: 30px; break-inside: avoid; }
                .header { display: flex; flex-wrap: wrap; gap: 8px 20px; margin-bottom: 12px; }
                .num { font-size: 1.4rem; font-weight: 700; color: #1565c0; }
                .meta { color: #555; font-size: 0.9rem; }
                .meta span { background: #f0f4f8; padding: 2px 14px; border-radius: 30px; margin-right: 6px; }
                .badge { display: inline-block; padding: 2px 16px; border-radius: 30px; font-size: 0.8rem; font-weight: 600; }
                .badge.ok { background: #2e7d32; color: white; }
                .badge.fail { background: #b71c1c; color: white; }
                .photos { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
                .photos img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
                .stats { background: #f8f9fa; padding: 10px 16px; border-radius: 12px; margin: 10px 0; font-size: 0.95rem; }
                .report-block { margin-top: 16px; border-top: 2px dashed #e0e0e0; padding-top: 16px; }
                .report-block .q { font-weight: 600; color: #333; margin-top: 10px; }
                .report-block .a { background: #fafafa; padding: 6px 14px; border-radius: 8px; border-left: 4px solid #1565c0; margin: 4px 0 10px 0; white-space: pre-wrap; }
                .footer { margin-top: 40px; text-align: center; color: #999; font-size: 0.8rem; border-top: 1px solid #eee; padding-top: 16px; }
                @media print { .no-print { display: none; } .serie { break-inside: avoid; } }
            </style>
            </head>
            <body>
            <h1>✈️ Rapports des séries d'essais</h1>
            <p style="color:#555;">Équipe : <strong>${escapeHtml(seriesData[0]?.equipe || '—')}</strong> &nbsp;|&nbsp; Exporté le ${new Date().toLocaleString()}</p>
            `;

            for (const serie of sorted) {
                const num = serie.numero;
                const report = reports[num] || { modified: '', reasons: '', effects: '' };
                const valid = serie.interpretation?.volNormal;
                const dirPct = serie.interpretation?.dirPct?.['tout droit'] || 0;
                const tangPct = serie.interpretation?.tangPct?.neutre || 0;
                const photos = serie.photos || {};
                const photoEntries = Object.entries(photos).filter(([_, v]) => v);

                htmlContent += `
                <div class="serie">
                    <div class="header">
                        <span class="num">#${num}</span>
                        <span class="meta">
                            <span>📅 ${serie.date || '—'}</span>
                            <span>🔧 ${serie.modele || '—'}</span>
                            <span>📊 ${serie.nbEssais || 0} essais</span>
                        </span>
                        <span class="badge ${valid ? 'ok' : 'fail'}">${valid ? '✅ OK' : '❌ À améliorer'}</span>
                    </div>

                    <div class="photos">
                        ${photoEntries.length > 0 ? photoEntries.map(([key, dataUrl]) => `
                            <img src="${dataUrl}" alt="${key}" title="${key}">
                        `).join('') : '<span style="color:#999;">Aucune photo</span>'}
                    </div>

                    <div class="stats">
                        <strong>Direction :</strong> Tout droit ${dirPct.toFixed(1)}% &nbsp;|&nbsp;
                        <strong>Tangage :</strong> Neutre ${tangPct.toFixed(1)}%
                        &nbsp;&nbsp;(seuil ≥ ${serie.interpretation?.seuilAccept || 60}%)
                    </div>

                    <div class="report-block">
                        <div class="q">🔧 1. Qu'avez-vous modifié ?</div>
                        <div class="a">${escapeHtml(report.modified || '(non renseigné)')}</div>

                        <div class="q">❓ 2. Pourquoi ces modifications ?</div>
                        <div class="a">${escapeHtml(report.reasons || '(non renseigné)')}</div>

                        <div class="q">📈 3. Quels ont été les effets observés ?</div>
                        <div class="a">${escapeHtml(report.effects || '(non renseigné)')}</div>
                        ${report._savedAt ? `<div style="text-align:right;font-size:0.75rem;color:#999;margin-top:6px;">Sauvegardé le ${new Date(report._savedAt).toLocaleString()}</div>` : ''}
                    </div>
                </div>
                `;
            }

            htmlContent += `
            <div class="footer">Rapports générés par l'outil PBL Avion — ${new Date().toFullYear()}</div>
            </body>
            </html>
            `;

            // Télécharger le fichier HTML
            const blob = new Blob([htmlContent], { type: 'text/html; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const teamName = seriesData[0]?.equipe?.trim() || 'equipe';
            const sanitized = teamName.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '_').replace(
                /[^a-zA-Z0-9_-]/g, '');
            a.download = `${sanitized}_rapports_${new Date().toISOString().slice(0,10)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📄 Rapport HTML exporté.', 2000);
        }

        // ============================================================
        //  IMPRESSION
        // ============================================================
        function printReports() {
            window.print();
        }

        // ============================================================
        //  MODAL PHOTO
        // ============================================================
        function openPhotoModal(src, label) {
            photoModalImg.src = src;
            photoModalLabel.textContent = label || 'Photo';
            photoModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePhotoModal() {
            photoModal.classList.remove('active');
            document.body.style.overflow = '';
        }

        photoModalClose.addEventListener('click', closePhotoModal);
        photoModal.addEventListener('click', function(e) {
            if (e.target === this) closePhotoModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePhotoModal();
        });

        // ============================================================
        //  EFFACER LES DONNÉES
        // ============================================================
        function clearAllData() {
            if (seriesData.length === 0 && Object.keys(reports).length === 0) {
                showToast('Aucune donnée à effacer.', 2000);
                return;
            }
            if (!confirm('Voulez-vous vraiment effacer toutes les données chargées et tous les rapports ?')) return;
            seriesData = [];
            reports = {};
            saveReportsToStorage();
            currentFile = null;
            fileStatus.textContent = 'Aucun fichier chargé';
            jsonUpload.value = '';
            renderAll();
            showToast('🗑️ Toutes les données ont été effacées.', 2000);
        }

        // ============================================================
        //  ÉVÉNEMENTS
        // ============================================================
        jsonUpload.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                loadJSON(this.files[0]);
            }
        });

        clearDataBtn.addEventListener('click', clearAllData);
        exportReportsBtn.addEventListener('click', exportReportsJSON);
        exportHtmlBtn.addEventListener('click', exportHTML);
        printBtn.addEventListener('click', printReports);

        // ============================================================
        //  INIT
        // ============================================================
        loadReportsFromStorage();
        renderAll();

        // Si un fichier JSON est passé en paramètre d'URL (pour faciliter les tests)
        // On peut aussi détecter un drag & drop mais on reste simple.

        console.log('📝 PBL Rapporteur chargé. Prêt à importer un JSON.');
    </script>

</body>
</html>
