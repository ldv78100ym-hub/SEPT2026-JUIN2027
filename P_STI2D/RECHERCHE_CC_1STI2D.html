<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Programme Maths 1ère STI2D (Tronc commun) 2026-2027</title>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async>
    </script>
    <style>
        /* Reset & box-sizing */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fb;
            color: #1e293b;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            /* empêche le défilement horizontal */;
        }

        /* ---- Menu vertical ---- */
        nav.sidebar {
            width: 280px;
            min-height: 100vh;
            background: #0b2b4a;
            color: #e2e8f0;
            padding: 1.5rem 1rem;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            align-self: flex-start;
            overflow-y: auto;
            max-height: 100vh;
            flex-shrink: 0;
            transition: width 0.2s;
        }

        nav.sidebar h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 0.2rem;
            color: #facc15;
            word-break: break-word;
        }
        nav.sidebar .sub {
            font-size: 0.75rem;
            opacity: 0.75;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.6rem;
        }
        .search-group {
            margin-bottom: 1.2rem;
        }
        .search-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #94a3b8;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }
        .search-group input,
        .search-group select {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            border: none;
            background: #1e3a5f;
            color: #f1f5f9;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            max-width: 100%;
        }
        .search-group input::placeholder {
            color: #94a3b8;
        }
        .search-group input:focus,
        .search-group select:focus {
            background: #2a4a72;
            box-shadow: 0 0 0 2px #facc15;
        }
        .filter-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-row .search-group {
            flex: 1 1 45%;
            min-width: 100px;
        }
        .btn-reset {
            background: #facc15;
            color: #0b2b4a;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.2rem;
        }
        .btn-reset:hover {
            background: #fde047;
        }
        .menu-stats {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid #334155;
            padding-top: 0.8rem;
            word-break: break-word;
        }
        .menu-stats span {
            display: inline-block;
            background: #1e3a5f;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            color: #e2e8f0;
            margin-right: 0.2rem;
        }

        /* ---- Contenu principal ---- */
        main {
            flex: 1;
            padding: 1.5rem 2rem;
            max-width: 100%;
            overflow-x: hidden;
        }
        main h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b2b4a;
            border-bottom: 3px solid #facc15;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        main h2 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #475569;
        }
        .result-count {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1e293b;
            margin-left: auto;
            white-space: nowrap;
        }

        /* Carte semaine */
        .week-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #facc15;
            transition: 0.15s;
            overflow: hidden;
            /* pour éviter les débordements internes */;
        }
        .week-card:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
            gap: 0.3rem;
        }
        .week-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b2b4a;
            word-break: break-word;
        }
        .week-header .badge {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
        }
        .week-title {
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.8rem;
            background: #f1f5f9;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            word-break: break-word;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem;
            margin-top: 0.3rem;
        }
        .content-block {
            background: #f8fafc;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            min-width: 0;
            /* permet le word-break */;
        }
        .content-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #475569;
            margin-bottom: 0.2rem;
            font-weight: 700;
        }
        .content-block ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .content-block li {
            font-size: 0.85rem;
            padding: 0.15rem 0;
            border-bottom: 1px dashed #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem 0.5rem;
            word-break: break-word;
        }
        .content-block li:last-child {
            border-bottom: none;
        }
        .tag {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.05rem 0.4rem;
            border-radius: 30px;
            background: #e2e8f0;
            color: #1e293b;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tag.coeur {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.retrouver {
            background: #dbeafe;
            color: #1e40af;
        }
        .tag.facile {
            background: #dcfce7;
            color: #166534;
        }
        .tag.moyen-f {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.moyen-d {
            background: #fde68a;
            color: #92400e;
        }
        .tag.difficile {
            background: #fecaca;
            color: #991b1b;
        }
        .tag.tres-d {
            background: #fca5a5;
            color: #7f1d1d;
        }

        .formula-latex {
            background: #f1f5f9;
            padding: 0.05rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #64748b;
        }

        /* Responsive */
        @media (max-width: 820px) {
            body {
                flex-direction: column;
            }
            nav.sidebar {
                width: 100%;
                min-height: auto;
                max-height: none;
                position: relative;
                padding: 1rem;
                box-shadow: none;
                border-bottom: 2px solid #facc15;
            }
            main {
                padding: 1rem;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
            .filter-row {
                flex-wrap: wrap;
            }
            .filter-row .search-group {
                flex: 1 1 100%;
                min-width: 0;
            }
            main h2 {
                font-size: 1.3rem;
            }
            .week-card {
                padding: 1rem;
            }
            .result-count {
                white-space: normal;
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .week-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .week-header .badge {
                align-self: flex-start;
            }
            .content-block li {
                font-size: 0.8rem;
            }
            .tag {
                font-size: 0.55rem;
                padding: 0.05rem 0.3rem;
            }
        }

        /* Utilitaires pour éviter les débordements */
        img,
        svg,
        canvas {
            max-width: 100%;
            height: auto;
        }
        pre,
        code {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .math {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <!-- ===== MENU VERTICAL ===== -->
    <nav class="sidebar" id="sidebar">
        <h1>📐 Maths 1<sup>re</sup> STI2D</h1>
        <div class="sub">Tronc commun – 2026/2027</div>

        <div class="search-group">
            <label for="searchSemaine">🔍 Semaine</label>
            <input type="text" id="searchSemaine" placeholder="ex: 5, 12-13, 25..." />
        </div>

        <div class="search-group">
            <label for="searchKeyword">🔎 Mot‑clé</label>
            <input type="text" id="searchKeyword" placeholder="dérivée, proba, suite..." />
        </div>

        <div class="filter-row">
            <div class="search-group">
                <label for="filterDifficulte">Difficulté</label>
                <select id="filterDifficulte">
                    <option value="">Toutes</option>
                    <option value="facile">Facile</option>
                    <option value="moyen-f">Moyennement facile</option>
                    <option value="moyen-d">Moyennement difficile</option>
                    <option value="difficile">Difficile</option>
                    <option value="tres-d">Très difficile</option>
                </select>
            </div>
            <div class="search-group">
                <label for="filterType">Type</label>
                <select id="filterType">
                    <option value="">Tous</option>
                    <option value="savoir">Savoir</option>
                    <option value="savoir-faire">Savoir‑faire</option>
                    <option value="methode">Méthode</option>
                    <option value="formule">Formule</option>
                    <option value="lecon">Leçon</option>
                </select>
            </div>
        </div>

        <button class="btn-reset" id="btnReset">⟲ Réinitialiser les filtres</button>

        <div class="menu-stats">
            <span id="nbResultats">0</span> résultat(s) affiché(s)
        </div>
    </nav>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main id="mainContent">
        <h2>
            Programme hebdomadaire
            <small>cliquez sur une semaine pour développer</small>
            <span class="result-count" id="resultCountBadge">0</span>
        </h2>
        <div id="cardsContainer"></div>
    </main>

    <script>
        // ============================================================
        //  DONNÉES EXHAUSTIVES (issues du programme + PDFs)
        // ============================================================
        const DATA = [];

        // Fonction utilitaire pour créer une entrée de semaine
        function sem(weekRange, title, savoir = [], savoirFaire = [], methodes = [], formules = [],
            lecons = [], difficulteMap = {}) {
            const defaultDiff = 'moyen-f';
            const items = [];

            function pushItems(arr, type) {
                arr.forEach(text => {
                    const diff = difficulteMap[type] || difficulteMap[text] || defaultDiff;
                    let know = '';
                    if (diff === 'facile' || diff === 'moyen-f') know = 'à connaître par cœur';
                    else if (diff === 'moyen-d' || diff === 'difficile') know = 'à savoir retrouver';
                    else if (diff === 'tres-d') know = 'à savoir retrouver (démonstration)';
                    items.push({ text, type, difficulte: diff, know });
                });
            }
            pushItems(savoir, 'savoir');
            pushItems(savoirFaire, 'savoir-faire');
            pushItems(methodes, 'methode');
            pushItems(formules, 'formule');
            pushItems(lecons, 'lecon');

            return { weekRange, title, items };
        }

        // ---- Construction des semaines à partir du tableau de progression ----
        DATA.push(sem('1-2', 'Suites – modes de génération, représentation graphique', [
            'Différents modes de génération d\'une suite (formule explicite, récurrence)',
            'Notation $u(n)$ et $u_n$',
            'Représentation graphique : nuage de points $(n, u_n)$'
        ], [
            'Calculer un terme de rang donné',
            'Réaliser et exploiter la représentation graphique d\'une suite',
            'Conjecturer la nature d\'une suite à partir de son graphique'
        ], [
            'Utiliser un tableur ou Python pour générer les termes',
            'Lire graphiquement le sens de variation'
        ], [
            '$u_n = f(n)$',
            '$u_{n+1} = g(u_n)$'
        ], [
            'Définition d\'une suite numérique',
            'Sens de variation'
        ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'moyen-f', 'formule': 'facile',
            'lecon': 'facile' }));

        DATA.push(sem('3-4', 'Suites arithmétiques – croissance linéaire', [
            'Définition : $u_{n+1} = u_n + r$',
            'Sens de variation selon le signe de $r$',
            'Représentation graphique : points alignés'
        ], [
            'Reconnaître une situation de croissance linéaire',
            'Démontrer qu\'une suite est arithmétique',
            'Déterminer le sens de variation'
        ], [
            'Calculer la raison à partir de deux termes',
            'Modéliser un phénomène à croissance absolue constante'
        ], [
            '$u_{n+1} - u_n = r$',
            '$u_n = u_0 + n \\cdot r$ (à connaître par cœur)'
        ], [
            'Définition d\'une suite arithmétique',
            'Formule du terme général (démonstration par sommation)'
        ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'moyen-f', 'formule': 'coeur',
            'lecon': 'moyen-f' }));

        DATA.push(sem('5-6', 'Suites géométriques – croissance exponentielle', [
            'Définition : $u_{n+1} = q \\cdot u_n$ avec $u_n > 0$',
            'Sens de variation selon $q$ (si $q>1$ croissante, $0<q<1$ décroissante)',
            'Représentation graphique'
        ], [
            'Reconnaître une situation de croissance exponentielle',
            'Démontrer qu\'une suite est géométrique',
            'Déterminer le sens de variation'
        ], [
            'Calculer la raison à partir de deux termes',
            'Modéliser une évolution relative constante (taux, bactéries, capital)'
        ], [
            '$\\dfrac{u_{n+1}}{u_n} = q$',
            '$u_n = u_0 \\cdot q^n$ (à connaître par cœur)'
        ], [
            'Définition d\'une suite géométrique',
            'Formule du terme général (démonstration par produit)'
        ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'moyen-f', 'formule': 'coeur',
            'lecon': 'moyen-f' }));

        DATA.push(sem('7-8', 'Polynômes du second degré – forme factorisée', [
            'Fonctions $x \\mapsto x^2$, $x \\mapsto x^2 + b$, $x \\mapsto a(x-x_1)(x-x_2)$',
            'Racines, signe, extremum, axe de symétrie',
            'Allure de la parabole'
        ], [
            'Associer une parabole à son expression algébrique',
            'Déterminer racines, signe, extremum, axe de symétrie',
            'Vérifier qu\'une valeur est racine'
        ], [
            'Factoriser une expression du second degré quand une racine est connue',
            'Utiliser la forme factorisée pour étudier le signe'
        ], [
            '$a(x-x_1)(x-x_2) = 0 \\iff x=x_1 \\text{ ou } x=x_2$',
            'Somme des racines $S = x_1+x_2 = -\\frac{b}{a}$ (hors programme, mais utile)'
        ], [
            'Forme factorisée d\'un polynôme de degré 2',
            'Lien entre racines et signe'
        ], { 'savoir': 'moyen-f', 'savoir-faire': 'moyen-d', 'methode': 'moyen-d', 'formule': 'moyen-f',
            'lecon': 'moyen-f' }));

        DATA.push(sem('9-10', 'Équation $x^2 = c$ et racine carrée', [
            'Si $c \\geq 0$, $x^2 = c \\iff x = \\sqrt{c}$ ou $x = -\\sqrt{c}$',
            'Si $c < 0$, pas de solution réelle'
        ], [
            'Résoudre $x^2 = c$',
            'Résoudre des équations se ramenant à $x^2 = c$'
        ], [
            'Isoler $x^2$ puis appliquer la règle'
        ], [
            '$\\sqrt{c}^2 = c$',
            '$x^2 = c \\iff x = \\pm \\sqrt{c}$'
        ], [
            'Définition de la racine carrée',
            'Résolution de $x^2 = c$'
        ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'facile', 'formule': 'coeur',
            'lecon': 'facile' }));

        DATA.push(sem('11-12', 'Nombre dérivé – sécantes, tangente', [
            'Taux de variation en un point',
            'Nombre dérivé comme limite du taux de variation',
            'Tangente comme position limite des sécantes',
            'Équation réduite de la tangente'
        ], [
            'Interpréter géométriquement le nombre dérivé (coefficient directeur de la tangente)',
            'Construire la tangente à une courbe en un point',
            'Déterminer l\'équation réduite de la tangente'
        ], [
            'Calculer le taux de variation $\\dfrac{f(a+h)-f(a)}{h}$',
            'Faire tendre $h$ vers 0 pour obtenir $f\'(a)$'
        ], [
            '$f\'(a) = \\displaystyle\\lim_{h\\to 0} \\dfrac{f(a+h)-f(a)}{h}$',
            '$y = f\'(a)(x-a) + f(a)$ (équation de la tangente)'
        ], [
            'Définition du nombre dérivé',
            'Interprétation graphique de la dérivée'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-d' }));

        DATA.push(sem('13-14', 'Synthèse : suites arithmétiques/géométriques et polynômes degré 2', [
            'Comparaison des croissances linéaire et exponentielle',
            'Lien entre suites et fonctions du second degré'
        ], [
            'Modéliser un problème à l\'aide d\'une suite ou d\'un polynôme',
            'Choisir le modèle adapté'
        ], [
            'Utiliser les formules de somme (si vues)',
            'Résoudre des problèmes d\'optimisation avec le second degré'
        ], [
            'Somme des termes d\'une suite arithmétique : $S_n = \\dfrac{n+1}{2}(u_0+u_n)$',
            'Somme des termes d\'une suite géométrique : $S_n = u_0 \\dfrac{1-q^{n+1}}{1-q}$ (si $q\\neq1$)'
        ], [
            'Bilan sur les suites',
            'Bilan sur les polynômes de degré 2'
        ], { 'savoir': 'moyen-f', 'savoir-faire': 'moyen-d', 'methode': 'difficile', 'formule': 'moyen-d',
            'lecon': 'moyen-f' }));

        DATA.push(sem('15-16', 'Polynômes du troisième degré – forme factorisée', [
            'Fonctions $x \\mapsto ax^3$, $x \\mapsto ax^3+b$',
            'Racines et signe de $a(x-x_1)(x-x_2)(x-x_3)$',
            'Équation $x^3 = c$ et racine cubique'
        ], [
            'Vérifier qu\'une valeur est racine d\'un polynôme de degré 3',
            'Factoriser dans des cas simples',
            'Utiliser la forme factorisée pour trouver les racines et étudier le signe',
            'Résoudre $x^3 = c$'
        ], [
            'Factoriser par $(x-\\alpha)$ quand $\\alpha$ est racine',
            'Étudier le signe d\'un produit de trois facteurs'
        ], [
            '$x^3 = c \\iff x = \\sqrt[3]{c}$ (pour $c \\geq 0$)',
            'Notation $c^{1/3}$ et $\\sqrt[3]{c}$'
        ], [
            'Forme factorisée d\'un polynôme de degré 3',
            'Racine cubique'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'moyen-f',
            'lecon': 'moyen-d' }));

        DATA.push(sem('17-18', 'Dérivée des polynômes de degré ≤ 3', [
            'Dérivée de $x \\mapsto x^2$ et $x \\mapsto x^3$',
            'Dérivée d\'une somme, de $kf$ ($k \\in \\mathbb{R}$)',
            'Dérivée d\'un polynôme de degré ≤ 3'
        ], [
            'Calculer la dérivée d\'un polynôme de degré ≤ 3',
            'Déterminer le signe de la dérivée'
        ], [
            'Appliquer les règles de dérivation terme à terme'
        ], [
            '$(x^2)\' = 2x$',
            '$(x^3)\' = 3x^2$',
            '$(f+g)\' = f\'+g\'$',
            '$(kf)\' = k f\'$'
        ], [
            'Règles de dérivation des polynômes',
            'Calcul de dérivée'
        ], { 'savoir': 'moyen-f', 'savoir-faire': 'moyen-d', 'methode': 'moyen-d', 'formule': 'coeur',
            'lecon': 'moyen-f' }));

        DATA.push(sem('19-20', 'Lien signe de la dérivée / variations (PBL 1)', [
            'Si $f\' > 0$ sur un intervalle, $f$ est strictement croissante',
            'Si $f\' < 0$ sur un intervalle, $f$ est strictement décroissante',
            'Extremums locaux'
        ], [
            'Déterminer le sens de variation d\'un polynôme de degré ≤ 3',
            'Dresser le tableau de variations',
            'Trouver les extremums'
        ], [
            'Étudier le signe de la dérivée',
            'Construire le tableau de variations'

        // ============================================================

        const container = document.getElementById('cardsContainer');
        const searchSemaine = document.getElementById('searchSemaine');
        const searchKeyword = document.getElementById('searchKeyword');
        const filterDifficulte = document.getElementById('filterDifficulte');
        const filterType = document.getElementById('filterType');
        const btnReset = document.getElementById('btnReset');
        const nbResultats = document.getElementById('nbResultats');
        const resultCountBadge = document.getElementById('resultCountBadge');

        function render() {
            const semaineFilter = searchSemaine.value.trim().toLowerCase();
            const keyword = searchKeyword.value.trim().toLowerCase();
            const diffFilter = filterDifficulte.value;
            const typeFilter = filterType.value;

            const filtered = DATA.filter(week => {
                if (semaineFilter) {
                    const parts = semaineFilter.split('-');
                    const start = parseInt(parts[0]);
                    const end = parts.length > 1 ? parseInt(parts[1]) : start;
                    const wRange = week.weekRange.split('-');
                    const wStart = parseInt(wRange[0]);
                    const wEnd = parseInt(wRange[1]);
                    if (wEnd < start || wStart > end) return false;
                }
                if (keyword) {
                    const matchTitle = week.title.toLowerCase().includes(keyword);
                    const matchItems = week.items.some(item =>
                        item.text.toLowerCase().includes(keyword) ||
                        item.type.toLowerCase().includes(keyword)
                    );
                    if (!matchTitle && !matchItems) return false;
                }
                if (diffFilter) {
                    const hasDiff = week.items.some(item => item.difficulte === diffFilter);
                    if (!hasDiff) return false;
                }
                if (typeFilter) {
                    const hasType = week.items.some(item => item.type === typeFilter);
                    if (!hasType) return false;
                }
                return true;
            });

            nbResultats.textContent = filtered.length;
            resultCountBadge.textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Aucune semaine ne correspond à vos critères.</p>
                        <p style="font-size:0.9rem;color:#94a3b8;">Essayez de modifier les filtres.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(week => {
                const itemsByType = {
                    'savoir': [],
                    'savoir-faire': [],
                    'methode': [],
                    'formule': [],
                    'lecon': []
                };
                week.items.forEach(item => {
                    if (itemsByType[item.type]) itemsByType[item.type].push(item);
                });

                html += `
                    <div class="week-card">
                        <div class="week-header">
                            <h3>Semaine ${week.weekRange}</h3>
                            <span class="badge">${week.items.length} éléments</span>
                        </div>
                        <div class="week-title">${week.title}</div>
                        <div class="content-grid">
                `;

                const typeLabels = {
                    'savoir': '📘 Savoirs',
                    'savoir-faire': '🛠️ Savoir‑faire',
                    'methode': '🧠 Méthodes',
                    'formule': '📐 Formules',
                    'lecon': '📖 Leçons'
                };
                const typeOrder = ['savoir', 'savoir-faire', 'methode', 'formule', 'lecon'];

                typeOrder.forEach(type => {
                    const items = itemsByType[type] || [];
                    if (items.length === 0) return;
                    html += `
                        <div class="content-block">
                            <h4>${typeLabels[type] || type}</h4>
                            <ul>
                    `;
                    items.forEach(item => {
                        const diffLabel = {
                            'facile': 'Facile',
                            'moyen-f': 'Moyennement facile',
                            'moyen-d': 'Moyennement difficile',
                            'difficile': 'Difficile',
                            'tres-d': 'Très difficile',
                            'coeur': 'À connaître par cœur'
                        } [item.difficulte] || item.difficulte;

                        const tagClass = item.difficulte === 'coeur' ? 'coeur' :
                            item.know.includes('retrouver') ? 'retrouver' :
                            item.difficulte;

                        html += `
                            <li>
                                <span>${item.text}</span>
                                <span class="tag ${tagClass}">${diffLabel}</span>
                                ${item.know ? `<span style="font-size:0.65rem;color:#475569;">${item.know}</span>` : ''}
                            </li>
                        `;
                    });
                    html += `</ul></div>`;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        searchSemaine.addEventListener('input', render);
        searchKeyword.addEventListener('input', render);
        filterDifficulte.addEventListener('change', render);
        filterType.addEventListener('change', render);
        btnReset.addEventListener('click', () => {
            searchSemaine.value = '';
            searchKeyword.value = '';
            filterDifficulte.value = '';
            filterType.value = '';
            render();
        });

        render();
    </script>
