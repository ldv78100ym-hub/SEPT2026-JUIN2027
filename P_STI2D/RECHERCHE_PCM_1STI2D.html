        MathJax = {

    <style>

        body {

        }

        /* ---- Menu vertical ---- */
        nav.sidebar {
            width: 280px;

            padding: 1.5rem 1rem;

        nav.sidebar h1 {

        }
        nav.sidebar .sub {

        .search-group {

        }
        .search-group label {
            display: block;
            font-size: 0.7rem;

        .search-group input,

        .menu-stats {
            margin-top: 1.5rem;
            font-size: 0.75rem;

        .menu-stats span {
            display: inline-block;
            background: #1e3a5f;

            border-radius: 20px;
            color: #e2e8f0;
            margin-right: 0.2rem;
        }

        /* ---- Contenu principal ---- */
        main {
            flex: 1;
            padding: 1.5rem 2rem;
            max-width: 100%;
            overflow-x: hidden;
        }
        main h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b2b4a;
            border-bottom: 3px solid #facc15;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        main h2 small {
            font-size: 0.9rem;
            font-weight: 400;

        }
        .result-count {
            background: #e2e8f0;

        /* Carte semaine */
        .week-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #facc15;
            transition: 0.15s;
            overflow: hidden;
        }
        .week-card:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
            gap: 0.3rem;
        }
        .week-header h3 {
            font-size: 1.3rem;
            font-weight: 600;

        }
        .week-header .badge {
            background: #e2e8f0;

        }
        .week-title {
            font-size: 1rem;

        .content-grid {
            display: grid;

        }
        .content-block h4 {

            text-transform: uppercase;

            margin-bottom: 0.2rem;

        }
        .content-block ul {
            list-style: none;

            margin: 0;
        }
        .content-block li {

        .tag {

        .tag.coeur {

        .tag.retrouver {

        .tag.facile {
            background: #dcfce7;

        }
        .tag.moyen-f {
            background: #fef9c3;

        }
        .tag.moyen-d {
            background: #fde68a;
            color: #92400e;
        }
        .tag.difficile {

        .formula-latex {
            background: #f1f5f9;

        .empty-state {

        /* Responsive */
        @media (max-width: 820px) {
            body {
                flex-direction: column;
            }
            nav.sidebar {
                width: 100%;
                min-height: auto;

            }
            main {

            }
            .filter-row {

            .filter-row .search-group {

            }
            .week-card {

            }

            }

        @media (max-width: 480px) {
            .week-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .week-header .badge {
                align-self: flex-start;
            }
            .content-block li {
                font-size: 0.8rem;
            }
            .tag {
                font-size: 0.55rem;

            }
        }

        img,
        svg,
        canvas {
            max-width: 100%;
            height: auto;
        }
        pre,
        code {

<body>

    <!-- ===== MENU VERTICAL ===== -->
    <nav class="sidebar" id="sidebar">
        <h1>📐 Maths 1<sup>re</sup> STI2D</h1>
        <div class="sub">Spécialité PCM – 2026/2027</div>

        <div class="search-group">
            <label for="searchSemaine">🔍 Semaine / Thème</label>
            <input type="text" id="searchSemaine" placeholder="ex: trigo, dérivée, complexe..." />
        </div>

        <div class="search-group">
            <label for="searchKeyword">🔎 Mot‑clé</label>
            <input type="text" id="searchKeyword" placeholder="cos, produit scalaire, primitive..." />
        </div>

        <div class="filter-row">
            <div class="search-group">
                <label for="filterDifficulte">Difficulté</label>
                <select id="filterDifficulte">
                    <option value="">Toutes</option>
                    <option value="facile">Facile</option>
                    <option value="moyen-f">Moyennement facile</option>
                    <option value="moyen-d">Moyennement difficile</option>
                    <option value="difficile">Difficile</option>
                    <option value="tres-d">Très difficile</option>
                </select>
            </div>
            <div class="search-group">
                <label for="filterType">Type</label>
                <select id="filterType">
                    <option value="">Tous</option>
                    <option value="savoir">Savoir</option>
                    <option value="savoir-faire">Savoir‑faire</option>
                    <option value="methode">Méthode</option>
                    <option value="formule">Formule</option>
                    <option value="lecon">Leçon</option>
                </select>
            </div>
        </div>

        <button class="btn-reset" id="btnReset">⟲ Réinitialiser les filtres</button>

        <div class="menu-stats">
            <span id="nbResultats">0</span> résultat(s) affiché(s)

    </nav>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main id="mainContent">
        <h2>
            Programme hebdomadaire
            <small>spécialité PCM</small>
            <span class="result-count" id="resultCountBadge">0</span>
        </h2>
        <div id="cardsContainer"></div>
    </main>

    <script>
        // ============================================================
        //  DONNÉES EXHAUSTIVES (issues du programme officiel PCM)
        // ============================================================
        const DATA = [];

        // Fonction utilitaire pour créer une entrée de semaine
        function sem(weekRange, title, savoir = [], savoirFaire = [], methodes = [], formules = [],
            lecons = [], difficulteMap = {}) {
            const defaultDiff = 'moyen-f';
            const items = [];

            function pushItems(arr, type) {
                arr.forEach(text => {
                    const diff = difficulteMap[type] || difficulteMap[text] || defaultDiff;
                    let know = '';
                    if (diff === 'facile' || diff === 'moyen-f') know = 'à connaître par cœur';
                    else if (diff === 'moyen-d' || diff === 'difficile') know = 'à savoir retrouver';
                    else if (diff === 'tres-d') know = 'à savoir retrouver (démonstration)';
                    items.push({ text, type, difficulte: diff, know });
                });
            }
            pushItems(savoir, 'savoir');
            pushItems(savoirFaire, 'savoir-faire');
            pushItems(methodes, 'methode');
            pushItems(formules, 'formule');
            pushItems(lecons, 'lecon');

            return { weekRange, title, items };
        }

        // ============================================================
        //  CONSTRUCTION DES SEMAINES À PARTIR DU PROGRAMME PCM
        //  (Répartition indicative sur 36 semaines)
        // ============================================================

        // --- Semaines 1-4 : Trigonométrie ---
        DATA.push(sem('1-4', 'Trigonométrie – cercle, sinus, cosinus', [
            'Cercle trigonométrique, radian',
            'Mesure d\'un angle orienté, mesure principale',
            'Fonctions sinus et cosinus : périodicité, variations, parité',
            'Valeurs remarquables en $0, \\frac{\\pi}{6}, \\frac{\\pi}{4}, \\frac{\\pi}{3}, \\frac{\\pi}{2}, \\pi$',
            'Fonctions $t \\mapsto A\\cos(\\omega t + \\phi)$ et $t \\mapsto A\\sin(\\omega t + \\phi)$'
        ], [
            'Effectuer des conversions degré ↔ radian',
            'Résoudre par lecture sur le cercle : $\\cos(x)=a$, $\\sin(x)=a$',
            'Utiliser les relations entre sinus et cosinus des angles associés',
            'Justifier les symétries des courbes'
        ], [
            'Placer un angle sur le cercle trigonométrique',
            'Lire les valeurs remarquables sur le cercle',
            'Utiliser les formules d\'angles associés'
        ], [
            '$\\cos^2 x + \\sin^2 x = 1$',
            '$\\cos(-x) = \\cos x$, $\\sin(-x) = -\\sin x$',
            '$\\cos(\\pi - x) = -\\cos x$, $\\sin(\\pi - x) = \\sin x$',
            '$\\cos(\\pi + x) = -\\cos x$, $\\sin(\\pi + x) = -\\sin x$',
            '$\\cos(\\frac{\\pi}{2} - x) = \\sin x$, $\\sin(\\frac{\\pi}{2} - x) = \\cos x$'
        ], [
            'Cercle trigonométrique',
            'Périodicité des fonctions sinus et cosinus',
            'Amplitude, période, phase à l\'origine'
        ], { 'savoir': 'moyen-f', 'savoir-faire': 'moyen-d', 'methode': 'moyen-d', 'formule': 'coeur',
            'lecon': 'moyen-f' }));

        // --- Semaines 5-8 : Produit scalaire ---
        DATA.push(sem('5-8', 'Produit scalaire – définition, propriétés, applications', [
            'Définition géométrique : $\\vec{u} \\cdot \\vec{v} = \\|\\vec{u}\\| \\times \\|\\vec{v}\\| \\times \\cos(\\theta)$',
            'Projection orthogonale d\'un vecteur sur un axe',
            'Interprétation du produit scalaire en termes de projections',
            'Bilinéarité, symétrie',
            'Expression analytique dans une base orthonormée',
            'Caractérisation de l\'orthogonalité',
            'Théorème d\'Al-Kashi, égalité du parallélogramme'
        ], [
            'Calculer la projection d\'un vecteur sur un axe',
            'Interpréter $\\|\\vec{u}\\| \\cos(\\theta)$ en termes de projection',
            'Utiliser le produit scalaire pour démontrer l\'orthogonalité',
            'Utiliser le produit scalaire pour calculer un angle ou une longueur'
        ], [
            'Déterminer le produit scalaire à partir des coordonnées',
            'Utiliser le théorème d\'Al-Kashi pour calculer une longueur dans un triangle'
        ], [
            '$\\vec{u} \\cdot \\vec{v} = x x\' + y y\'$ dans un repère orthonormé',
            '$\\|\\vec{u}\\|^2 = x^2 + y^2$',
            '$\\vec{u} \\cdot \\vec{v} = 0 \\iff \\vec{u} \\perp \\vec{v}$',
            'Al-Kashi : $a^2 = b^2 + c^2 - 2bc \\cos\\alpha$'
        ], [
            'Définition du produit scalaire',
            'Propriétés de bilinéarité et de symétrie',
            'Théorème d\'Al-Kashi'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-d' }));

        // --- Semaines 9-12 : Nombres complexes (forme algébrique) ---
        DATA.push(sem('9-12', 'Nombres complexes – forme algébrique, conjugué, module', [
            'Forme algébrique : $z = a + ib$',
            'Conjugué : $\\overline{z} = a - ib$',
            'Module : $|z| = \\sqrt{a^2 + b^2}$',
            'Représentation dans un repère orthonormé direct',
            'Affixe d\'un point, d\'un vecteur',
            'Somme, produit, quotient de complexes',
            'Conjugué d\'une somme, d\'un produit, d\'un quotient',
            'Module d\'un produit et d\'un quotient'
        ], [
            'Calculer la partie réelle, la partie imaginaire, le conjugué, le module',
            'Interpréter géométriquement ces notions',
            'Passer de la forme algébrique à la forme trigonométrique (et inversement)'
        ], [
            'Utiliser les propriétés du conjugué pour simplifier des expressions',
            'Représenter un nombre complexe dans le plan'
        ], [
            '$z = a + ib$ avec $a,b \\in \\mathbb{R}$',
            '$\\overline{z} = a - ib$',
            '$|z| = \\sqrt{a^2 + b^2}$',
            '$z \\overline{z} = |z|^2$',
            '$\\overline{z_1 + z_2} = \\overline{z_1} + \\overline{z_2}$',
            '$\\overline{z_1 z_2} = \\overline{z_1} \\overline{z_2}$',
            '$|z_1 z_2| = |z_1| |z_2|$'
        ], [
            'Définition des nombres complexes',
            'Représentation géométrique',
            'Propriétés du conjugué et du module'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-d' }));

        // --- Semaines 13-16 : Nombres complexes (argument, forme trigonométrique) ---
        DATA.push(sem('13-16', 'Nombres complexes – argument, forme trigonométrique', [
            'Argument d\'un nombre complexe non nul',
            'Forme trigonométrique : $z = r(\\cos\\theta + i\\sin\\theta)$',
            'Lien entre forme algébrique et forme trigonométrique'
        ], [
            'Calculer un argument d\'un nombre complexe',
            'Passer de la forme algébrique à la forme trigonométrique et inversement',
            'Interpréter géométriquement l\'argument'
        ], [
            'Utiliser le cercle trigonométrique pour déterminer un argument',
            'Passer de $a+ib$ à $r(\\cos\\theta + i\\sin\\theta)$'
        ], [
            '$\\arg(z) = \\theta$ tel que $z = r(\\cos\\theta + i\\sin\\theta)$',
            '$\\arg(zz\') = \\arg(z) + \\arg(z\')$ (vu en terminale)'
        ], [
            'Argument d\'un nombre complexe',
            'Forme trigonométrique'
        ], { 'savoir': 'difficile', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'moyen-d',
            'lecon': 'difficile' }));

        // --- Semaines 17-20 : Dérivées (point de vue local et global) ---
        DATA.push(sem('17-20', 'Dérivées – taux de variation, fonctions dérivées', [
            'Notations : $\\left(\\frac{\\Delta y}{\\Delta x}\\right)_{x_0}$, $\\frac{dy}{dx}(x_0)$, $\\frac{d}{dx}f(x_0)$, $f\'(x_0)$',
            'Approximation affine : $f(x_0+h) \\approx f(x_0) + h f\'(x_0)$',
            'Dérivée d\'une somme, d\'un produit, de l\'inverse, d\'un quotient',
            'Dérivée de $x \\mapsto x^n$ ($n\\in\\mathbb{N}^*$) et de $x \\mapsto \\frac{1}{x}$',
            'Dérivée d\'un polynôme',
            'Dérivée de $\\cos$ et $\\sin$',
            'Dérivée de $x \\mapsto f(ax+b)$, $t \\mapsto A\\cos(\\omega t + \\phi)$, $t \\mapsto A\\sin(\\omega t + \\phi)$'
        ], [
            'Utiliser les différentes notations du taux de variation et du nombre dérivé',
            'Effectuer des calculs approchés à l\'aide de l\'approximation affine',
            'Calculer une fonction dérivée',
            'Étudier le sens de variation d\'une fonction'
        ], [
            'Calculer le taux de variation puis passer à la limite',
            'Appliquer les règles de dérivation'
        ], [
            '$(u+v)\' = u\' + v\'$',
            '$(ku)\' = k u\'$',
            '$(uv)\' = u\'v + uv\'$',
            '$\\left(\\frac{1}{u}\\right)\' = -\\frac{u\'}{u^2}$',
            '$\\left(\\frac{u}{v}\\right)\' = \\frac{u\'v - uv\'}{v^2}$',
            '$(x^n)\' = n x^{n-1}$',
            '$\\left(\\frac{1}{x}\\right)\' = -\\frac{1}{x^2}$',
            '$\\cos\' = -\\sin$, $\\sin\' = \\cos$',
            '$[f(ax+b)]\' = a f\'(ax+b)$'
        ], [
            'Définition du nombre dérivé',
            'Règles de dérivation',
            'Lien entre signe de la dérivée et variations'
        ], { 'savoir': 'difficile', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // --- Semaines 21-24 : Primitives ---
        DATA.push(sem('21-24', 'Primitives – définition, calcul, méthode d\'Euler', [
            'Définition d\'une primitive',
            'Deux primitives d\'une même fonction diffèrent d\'une constante',
            'Primitives d\'un polynôme',
            'Primitives de $t \\mapsto A\\cos(\\omega t + \\phi)$ et $t \\mapsto A\\sin(\\omega t + \\phi)$',
            'Méthode d\'Euler pour le calcul approché d\'une primitive'
        ], [
            'Calculer des primitives',
            'Construire point par point, par la méthode d\'Euler, une approximation de la courbe représentative de la solution d\'un problème de Cauchy $y\' = f(t)$, $y(t_0) = y_0$'
        ], [
            'Trouver une primitive en inversant les règles de dérivation',
            'Appliquer la méthode d\'Euler avec un pas $h$'
        ], [
            'Si $F\' = f$, alors $F$ est une primitive de $f$',
            '$\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$ (pour $n \\neq -1$)',
            '$\\int \\cos(\\omega t + \\phi) dt = \\frac{1}{\\omega} \\sin(\\omega t + \\phi) + C$',
            '$\\int \\sin(\\omega t + \\phi) dt = -\\frac{1}{\\omega} \\cos(\\omega t + \\phi) + C$'
        ], [
            'Définition d\'une primitive',
            'Méthode d\'Euler'
        ], { 'savoir': 'difficile', 'savoir-faire': 'difficile', 'methode': 'tres-d', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // --- Semaines 25-28 : Synthèse dérivation / primitives ---
        DATA.push(sem('25-28', 'Synthèse – dérivation et primitives', [
            'Lien entre dérivation et primitives',
            'Applications en physique-chimie : vitesse, accélération, énergie'
        ], [
            'Résoudre des problèmes de physique utilisant la dérivation et les primitives',
            'Interpréter physiquement le nombre dérivé et la primitive'
        ], [
            'Utiliser l\'approximation affine pour estimer des variations',
            'Utiliser les primitives pour calculer des grandeurs physiques'
        ], [
            'Rappel de toutes les formules de dérivation et de primitives'
        ], [
            'Bilan sur la dérivation et les primitives',
            'Liens avec la physique-chimie'
        ], { 'savoir': 'moyen-f', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-f' }));

        // --- Semaines 29-32 : Géométrie dans le plan (approfondissement) ---
        DATA.push(sem('29-32', 'Géométrie dans le plan – approfondissement', [
            'Équations de droites et de cercles',
            'Utilisation du produit scalaire pour résoudre des problèmes de géométrie',
            'Nombres complexes et géométrie (affixes, transformations)'
        ], [
            'Résoudre des problèmes de géométrie plane en utilisant le produit scalaire et les nombres complexes',
            'Déterminer des équations de cercles'
        ], [
            'Utiliser les coordonnées pour résoudre des problèmes de géométrie',
            'Interpréter géométriquement les opérations sur les complexes'
        ], [
            'Équation d\'un cercle : $(x-a)^2 + (y-b)^2 = r^2$',
            'Affixe d\'un point : $z = x + iy$'
        ], [
            'Synthèse sur la géométrie plane'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'moyen-d',
            'lecon': 'moyen-d' }));

        // --- Semaines 33-36 : Préparation au bac et révisions ---
        DATA.push(sem('33-36', 'Révisions et préparation au bac', [
            'Tous les contenus de l\'année'
        ], [
            'Résoudre des exercices de synthèse',
            'Mobiliser les compétences dans des contextes variés (physique-chimie, industrie)'
        ], [
            'Organiser ses révisions par thème',
            'Travailler sur des sujets type bac'
        ], [
            'Toutes les formules à connaître'
        ], [
            'Fiches de révision'
        ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'facile', 'formule': 'facile',
            'lecon': 'facile' }));

        // ============================================================
        //  RENDU DYNAMIQUE
        // ============================================================
        const container = document.getElementById('cardsContainer');
        const searchSemaine = document.getElementById('searchSemaine');
        const searchKeyword = document.getElementById('searchKeyword');
        const filterDifficulte = document.getElementById('filterDifficulte');
        const filterType = document.getElementById('filterType');
        const btnReset = document.getElementById('btnReset');
        const nbResultats = document.getElementById('nbResultats');
        const resultCountBadge = document.getElementById('resultCountBadge');

        function render() {
            const semaineFilter = searchSemaine.value.trim().toLowerCase();
            const keyword = searchKeyword.value.trim().toLowerCase();
            const diffFilter = filterDifficulte.value;
            const typeFilter = filterType.value;

            const filtered = DATA.filter(week => {
                if (semaineFilter) {
                    const matchTitle = week.title.toLowerCase().includes(semaineFilter);
                    const matchRange = week.weekRange.toLowerCase().includes(semaineFilter);
                    if (!matchTitle && !matchRange) return false;
                }
                if (keyword) {
                    const matchTitle = week.title.toLowerCase().includes(keyword);
                    const matchItems = week.items.some(item =>
                        item.text.toLowerCase().includes(keyword) ||
                        item.type.toLowerCase().includes(keyword)
                    );
                    if (!matchTitle && !matchItems) return false;
                }
                if (diffFilter) {
                    const hasDiff = week.items.some(item => item.difficulte === diffFilter);
                    if (!hasDiff) return false;
                }
                if (typeFilter) {
                    const hasType = week.items.some(item => item.type === typeFilter);
                    if (!hasType) return false;
                }
                return true;
            });

            nbResultats.textContent = filtered.length;
            resultCountBadge.textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Aucune semaine ne correspond à vos critères.</p>
                        <p style="font-size:0.9rem;color:#94a3b8;">Essayez de modifier les filtres.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(week => {
                const itemsByType = {
                    'savoir': [],
                    'savoir-faire': [],
                    'methode': [],
                    'formule': [],
                    'lecon': []
                };
                week.items.forEach(item => {
                    if (itemsByType[item.type]) itemsByType[item.type].push(item);
                });

                html += `
                    <div class="week-card">
                        <div class="week-header">
                            <h3>Semaine ${week.weekRange}</h3>
                            <span class="badge">${week.items.length} éléments</span>
                        </div>
                        <div class="week-title">${week.title}</div>
                        <div class="content-grid">
                `;

                const typeLabels = {
                    'savoir': '📘 Savoirs',
                    'savoir-faire': '🛠️ Savoir‑faire',
                    'methode': '🧠 Méthodes',
                    'formule': '📐 Formules',
                    'lecon': '📖 Leçons'
                };
                const typeOrder = ['savoir', 'savoir-faire', 'methode', 'formule', 'lecon'];

                typeOrder.forEach(type => {
                    const items = itemsByType[type] || [];
                    if (items.length === 0) return;
                    html += `
                        <div class="content-block">
                            <h4>${typeLabels[type] || type}</h4>
                            <ul>
                    `;
                    items.forEach(item => {
                        const diffLabel = {
                            'facile': 'Facile',
                            'moyen-f': 'Moyennement facile',
                            'moyen-d': 'Moyennement difficile',
                            'difficile': 'Difficile',
                            'tres-d': 'Très difficile',
                            'coeur': 'À connaître par cœur'
                        } [item.difficulte] || item.difficulte;

                        const tagClass = item.difficulte === 'coeur' ? 'coeur' :
                            item.know.includes('retrouver') ? 'retrouver' :
                            item.difficulte;

                        html += `
                            <li>
                                <span>${item.text}</span>
                                <span class="tag ${tagClass}">${diffLabel}</span>
                                ${item.know ? `<span style="font-size:0.65rem;color:#475569;">${item.know}</span>` : ''}
                            </li>
                        `;
                    });
                    html += `</ul></div>`;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        searchSemaine.addEventListener('input', render);
        searchKeyword.addEventListener('input', render);
        filterDifficulte.addEventListener('change', render);
        filterType.addEventListener('change', render);
        btnReset.addEventListener('click', () => {
            searchSemaine.value = '';
            searchKeyword.value = '';
            filterDifficulte.value = '';
            filterType.value = '';
            render();
        });

        render();
    </script>

</body>
</html>
