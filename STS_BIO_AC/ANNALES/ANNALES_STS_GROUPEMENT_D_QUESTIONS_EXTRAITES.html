<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questions BTS – Affichage en colonnes</title>

  <!-- MathJax 3 pour le rendu LaTeX -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
  </script>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      margin: 20px;
      color: #1e293b;
    }
    h1 {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 1.8rem;
      margin-bottom: 0.2rem;
    }
    .badge {
      background: #e2e8f0;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Zone de chargement */
    .upload-area {
      background: white;
      border-radius: 16px;
      padding: 25px 30px;
      margin: 20px 0;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .upload-area label {
      background: #1e293b;
      color: white;
      padding: 10px 22px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .upload-area label:hover {
      background: #0f172a;
    }
    .upload-area input[type="file"] {
      display: none;
    }
    .file-status {
      font-size: 0.95rem;
      color: #475569;
    }
    .file-status strong {
      color: #0f172a;
    }
    .file-status .error {
      color: #dc2626;
    }
    .file-status .success {
      color: #059669;
    }

    .status {
      padding: 12px 18px;
      border-radius: 10px;
      margin: 16px 0;
      font-weight: 500;
    }
    .status.waiting {
      background: #f1f5f9;
      color: #475569;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 20px;
      background: white;
      padding: 14px 20px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      margin: 16px 0;
      align-items: center;
    }
    .filters label {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filters input,
    .filters select {
      padding: 6px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
    }
    .sort-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: #f1f5f9;
      padding: 4px 12px 4px 16px;
      border-radius: 30px;
    }
    .sort-group label {
      font-weight: 600;
      color: #334155;
    }
    .sort-group select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: white;
    }
    .sort-group button {
      background: #1e293b;
      color: white;
      border: none;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sort-group button:hover {
      background: #0f172a;
    }
    .sort-indicator {
      font-weight: 600;
      color: #4338ca;
      font-size: 0.85rem;
    }

    /* Conteneur des questions */
    #questionsContainer {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 10px;
    }

    /* Chaque question = carte en deux colonnes */
    .question-item {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .question-item:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
    }

    /* Colonne de gauche (contexte + texte) */
    .question-left {
      flex: 2;
      min-width: 300px;
      padding: 20px 24px;
      background: #fafcff;
    }
    .question-left .context {
      font-size: 0.9rem;
      color: #475569;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #e2e8f0;
    }
    .question-left .context strong {
      color: #0f172a;
    }
    .question-left .question-text {
      font-size: 1rem;
      line-height: 1.6;
      color: #0f172a;
    }
    .question-left .question-text .math {
      display: inline-block;
    }

    /* Colonne de droite (métadonnées) */
    .question-right {
      flex: 1;
      min-width: 220px;
      padding: 20px 24px;
      background: #f8fafc;
      border-left: 1px solid #eef2f6;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.85rem;
    }
    .question-right .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px 8px;
    }
    .question-right .meta-label {
      font-weight: 600;
      color: #475569;
      min-width: 80px;
    }
    .question-right .meta-value {
      color: #1e293b;
    }
    .question-right .source-badge {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .question-right .tag {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      margin: 2px 4px 2px 0;
    }
    .question-right .complete-true {
      color: #059669;
      font-weight: 600;
    }
    .question-right .complete-false {
      color: #dc2626;
      font-weight: 600;
    }
    .question-right .missing-info {
      background: #fffbeb;
      color: #b45309;
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      display: inline-block;
    }
    .question-right .meta-value .tag:last-child {
      margin-right: 0;
    }

    /* Message aucun résultat */
    .no-result {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
      font-size: 1.1rem;
    }

    @media (max-width: 700px) {
      .question-item {
        flex-direction: column;
      }
      .question-right {
        border-left: none;
        border-top: 1px solid #eef2f6;
      }
      .filters {
        flex-direction: column;
        align-items: stretch;
      }
      .upload-area {
        flex-direction: column;
        align-items: flex-start;
      }
      .sort-group {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <h1>
    📋 Questions extraites des sujets BTS
    <span class="badge" id="countDisplay">0 questions</span>
  </h1>

  <!-- Zone de chargement -->
  <div class="upload-area">
    <label for="jsonFileInput">📂 Choisir un fichier JSON</label>
    <input type="file" id="jsonFileInput" accept=".json,application/json" />
    <span class="file-status" id="fileStatus">Aucun fichier chargé</span>
  </div>

  <div id="statusMessage" class="status waiting">⏳ En attente d’un fichier JSON…</div>

  <!-- Filtres et tri -->
  <div class="filters">
    <label>🔍 Recherche <input type="text" id="searchInput" placeholder="id, texte, source…" /></label>
    <label>📁 Source <select id="sourceFilter"><option value="">Toutes</option></select></label>
    <label>✅ Complétude <select id="completeFilter"><option value="">Toutes</option><option value="true">Complètes</option><option value="false">Incomplètes</option></select></label>

    <!-- Zone de tri -->
    <div class="sort-group">
      <label>Trier par</label>
      <select id="sortColumnSelect">
        <option value="">(aucun)</option>
        <option value="source">Source</option>
        <option value="exercise">Exercice</option>
        <option value="part">Partie</option>
        <option value="question">Question</option>
        <option value="math_notions">Notions</option>
        <option value="math_competencies">Comp. math.</option>
        <option value="general_competencies">Comp. générales</option>
        <option value="difficulty">Difficulté</option>
        <option value="complete">Complète</option>
      </select>
      <button id="sortOrderToggle">▲ Asc</button>
      <span class="sort-indicator" id="sortIndicator"></span>
    </div>
  </div>

  <!-- Conteneur des questions -->
  <div id="questionsContainer"></div>

  <script>
    // ===================================================================
    //  Références DOM
    // ===================================================================
    const fileInput = document.getElementById('jsonFileInput');
    const fileStatus = document.getElementById('fileStatus');
    const statusEl = document.getElementById('statusMessage');
    const container = document.getElementById('questionsContainer');
    const countDisplay = document.getElementById('countDisplay');
    const searchInput = document.getElementById('searchInput');
    const sourceFilter = document.getElementById('sourceFilter');
    const completeFilter = document.getElementById('completeFilter');
    const sortColumnSelect = document.getElementById('sortColumnSelect');
    const sortOrderToggle = document.getElementById('sortOrderToggle');
    const sortIndicator = document.getElementById('sortIndicator');

    let allQuestions = [];
    let filteredQuestions = [];
    let sortColumn = '';
    let sortAscending = true; // true = asc, false = desc

    // ===================================================================
    //  Fonctions de tri
    // ===================================================================
    function getSortValue(question, colName) {
      switch (colName) {
        case 'source': return question.source || '';
        case 'exercise': return question.exercise || '';
        case 'part': return question.part || '';
        case 'question': return question.question || '';
        case 'math_notions': return (question.math_notions || []).join(' ');
        case 'math_competencies': return (question.math_competencies || []).join(' ');
        case 'general_competencies': return (question.general_competencies || []).join(' ');
        case 'difficulty': return question.difficulty || '';
        case 'complete': return question.complete; // booléen
        default: return '';
      }
    }

    function sortQuestions(questions, col, asc) {
      if (!col) return questions.slice(); // pas de tri
      const direction = asc ? 1 : -1;
      return questions.slice().sort((a, b) => {
        let valA = getSortValue(a, col);
        let valB = getSortValue(b, col);

        // Gérer les booléens pour "complete"
        if (typeof valA === 'boolean' && typeof valB === 'boolean') {
          return direction * (valA === valB ? 0 : valA ? -1 : 1);
        }

        // Sinon, comparer comme chaînes (insensible à la casse)
        valA = String(valA).toLowerCase();
        valB = String(valB).toLowerCase();
        const comp = valA.localeCompare(valB);
        return direction * comp;
      });
    }

    // ===================================================================
    //  Fonctions d'affichage
    // ===================================================================
    function renderQuestions(questions) {
      if (!questions || questions.length === 0) {
        container.innerHTML = `<div class="no-result">Aucune question ne correspond aux filtres.</div>`;
        countDisplay.textContent = '0 question';
        return;
      }

      let html = '';
      for (const q of questions) {
        const contextHtml = q.context ? `<div class="context"><strong>Contexte :</strong> ${q.context}</div>` : '';
        const safeText = q.text || '';

        const notions = (q.math_notions || []).map(n => `<span class="tag">${n}</span>`).join('');
        const mathComp = (q.math_competencies || []).map(c => `<span class="tag">${c}</span>`).join('');
        const genComp = (q.general_competencies || []).map(c => `<span class="tag">${c}</span>`).join('');
        const completeClass = q.complete ? 'complete-true' : 'complete-false';
        const completeLabel = q.complete ? '✅ Oui' : '❌ Non';
        const missing = q.missing_info ? `<span class="missing-info">${q.missing_info}</span>` : '';

        html += `
          <div class="question-item">
            <div class="question-left">
              ${contextHtml}
              <div class="question-text">${safeText}</div>
            </div>
            <div class="question-right">
              <div class="meta-row"><span class="meta-label">Source</span><span class="source-badge">${q.source || ''}</span></div>
              <div class="meta-row"><span class="meta-label">Exercice</span><span class="meta-value">${q.exercise || ''}</span></div>
              <div class="meta-row"><span class="meta-label">Partie</span><span class="meta-value">${q.part || ''}</span></div>
              <div class="meta-row"><span class="meta-label">Question</span><span class="meta-value">${q.question || ''}</span></div>
              <div class="meta-row"><span class="meta-label">Notions</span><span class="meta-value">${notions}</span></div>
              <div class="meta-row"><span class="meta-label">Comp. math.</span><span class="meta-value">${mathComp}</span></div>
              <div class="meta-row"><span class="meta-label">Comp. générales</span><span class="meta-value">${genComp}</span></div>
              <div class="meta-row"><span class="meta-label">Difficulté</span><span class="meta-value">${q.difficulty || ''}</span></div>
              <div class="meta-row"><span class="meta-label">Complète</span><span class="meta-value ${completeClass}">${completeLabel}</span></div>
              ${missing ? `<div class="meta-row"><span class="meta-label">Info manquante</span><span class="meta-value">${missing}</span></div>` : ''}
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
      countDisplay.textContent = `${questions.length} question${questions.length > 1 ? 's' : ''}`;

      // Mettre à jour l'indicateur de tri
      updateSortIndicator();

      // Demander à MathJax de relire le DOM pour les nouvelles formules
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise();
      }
    }

    function updateSortIndicator() {
      if (!sortColumn) {
        sortIndicator.textContent = '';
        return;
      }
      const label = sortColumnSelect.options[sortColumnSelect.selectedIndex]?.text || sortColumn;
      const arrow = sortAscending ? '▲' : '▼';
      sortIndicator.textContent = `Tri : ${label} ${arrow}`;
    }

    function applyFiltersAndSort() {
      const search = searchInput.value.toLowerCase().trim();
      const source = sourceFilter.value;
      const complete = completeFilter.value;

      let filtered = allQuestions.filter(q => {
        if (source && q.source !== source) return false;
        if (complete !== '') {
          const isComplete = (complete === 'true');
          if (q.complete !== isComplete) return false;
        }
        if (search) {
          const haystack = (q.id + ' ' + q.text + ' ' + q.context + ' ' + q.source + ' ' + q.exercise + ' ' + (q.math_notions || []).join(' ')).toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });

      // Appliquer le tri si une colonne est sélectionnée
      if (sortColumn) {
        filtered = sortQuestions(filtered, sortColumn, sortAscending);
      }

      filteredQuestions = filtered;
      renderQuestions(filteredQuestions);
    }

    // ===================================================================
    //  Remplir le select des sources
    // ===================================================================
    function populateSourceSelect(questions) {
      const sources = new Set();
      for (const q of questions) {
        if (q.source) sources.add(q.source);
      }
      const sel = sourceFilter;
      sel.innerHTML = '<option value="">Toutes</option>';
      for (const s of sources) {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        sel.appendChild(opt);
      }
    }

    // ===================================================================
    //  Traitement du fichier chargé
    // ===================================================================
    function processFile(file) {
      fileStatus.innerHTML = `<strong>${file.name}</strong> (${(file.size / 1024).toFixed(1)} Ko) – en cours de lecture…`;
      statusEl.textContent = '⏳ Lecture et analyse du fichier…';
      statusEl.className = 'status waiting';

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const json = JSON.parse(e.target.result);
          if (!Array.isArray(json)) throw new Error('Le fichier JSON ne contient pas un tableau.');

          allQuestions = json;
          populateSourceSelect(allQuestions);
          // Réinitialiser le tri
          sortColumn = '';
          sortAscending = true;
          sortColumnSelect.value = '';
          applyFiltersAndSort();

          fileStatus.innerHTML = `<strong>${file.name}</strong> (${(file.size / 1024).toFixed(1)} Ko) – ✅ Chargé avec succès (${allQuestions.length} questions)`;
          statusEl.textContent = `✅ ${allQuestions.length} questions chargées et prêtes.`;
          statusEl.className = 'status success';

        } catch (err) {
          fileStatus.innerHTML = `<span class="error">❌ Erreur : ${err.message}</span>`;
          statusEl.textContent = `❌ Erreur de parsing : ${err.message}`;
          statusEl.className = 'status error';
          container.innerHTML = `<div class="no-result">Le fichier sélectionné n'est pas un JSON valide ou ne correspond pas au format attendu.</div>`;
          countDisplay.textContent = '0 question';
          allQuestions = [];
          populateSourceSelect([]);
          updateSortIndicator();
        }
      };

      reader.onerror = function() {
        fileStatus.innerHTML = `<span class="error">❌ Erreur de lecture du fichier.</span>`;
        statusEl.textContent = '❌ Impossible de lire le fichier.';
        statusEl.className = 'status error';
      };

      reader.readAsText(file);
    }

    // ===================================================================
    //  Écouteurs
    // ===================================================================
    fileInput.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (!file) {
        fileStatus.textContent = 'Aucun fichier sélectionné.';
        statusEl.textContent = '⏳ En attente d’un fichier JSON…';
        statusEl.className = 'status waiting';
        container.innerHTML = `<div class="no-result">Aucune donnée – veuillez charger un fichier JSON.</div>`;
        countDisplay.textContent = '0 question';
        return;
      }

      if (!file.name.toLowerCase().endsWith('.json') && file.type !== 'application/json') {
        fileStatus.innerHTML = `<span class="error">⚠️ Le fichier ne semble pas être un JSON (extension .json attendue).</span>`;
      }

      processFile(file);
    });

    searchInput.addEventListener('input', applyFiltersAndSort);
    sourceFilter.addEventListener('change', applyFiltersAndSort);
    completeFilter.addEventListener('change', applyFiltersAndSort);

    // Écouteurs pour le tri
    sortColumnSelect.addEventListener('change', function() {
      sortColumn = this.value;
      if (!sortColumn) {
        // Si on choisit "(aucun)", on réinitialise l'indicateur
        sortIndicator.textContent = '';
      }
      applyFiltersAndSort();
    });

    sortOrderToggle.addEventListener('click', function() {
      sortAscending = !sortAscending;
      this.textContent = sortAscending ? '▲ Asc' : '▼ Desc';
      applyFiltersAndSort();
    });

    // ===================================================================
    //  Initialisation
    // ===================================================================
    container.innerHTML = `<div class="no-result">Aucune donnée – veuillez charger un fichier JSON.</div>`;
    updateSortIndicator();
  </script>
</body>
</html>
