<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Maths Complémentaires Tle Générale 2026-2027</title>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async>
    </script>
    <style>
        /* ===== CSS issu du fichier RECHERCHE_CC_TSTI2D.html ===== */
        /* Reset & box-sizing */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fb;
            color: #1e293b;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---- Menu vertical ---- */
        nav.sidebar {
            width: 280px;
            min-height: 100vh;
            background: #0b2b4a;
            color: #e2e8f0;
            padding: 1.5rem 1rem;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            align-self: flex-start;
            overflow-y: auto;
            max-height: 100vh;
            flex-shrink: 0;
            transition: width 0.2s;
        }

        nav.sidebar h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 0.2rem;
            color: #facc15;
            word-break: break-word;
        }
        nav.sidebar .sub {
            font-size: 0.75rem;
            opacity: 0.75;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.6rem;
        }
        .search-group {
            margin-bottom: 1.2rem;
        }
        .search-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #94a3b8;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }
        .search-group input,
        .search-group select {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            border: none;
            background: #1e3a5f;
            color: #f1f5f9;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            max-width: 100%;
        }
        .search-group input::placeholder {
            color: #94a3b8;
        }
        .search-group input:focus,
        .search-group select:focus {
            background: #2a4a72;
            box-shadow: 0 0 0 2px #facc15;
        }
        .filter-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-row .search-group {
            flex: 1 1 45%;
            min-width: 100px;
        }
        .btn-reset {
            background: #facc15;
            color: #0b2b4a;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.2rem;
        }
        .btn-reset:hover {
            background: #fde047;
        }
        .menu-stats {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid #334155;
            padding-top: 0.8rem;
            word-break: break-word;
        }
        .menu-stats span {
            display: inline-block;
            background: #1e3a5f;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            color: #e2e8f0;
            margin-right: 0.2rem;
        }

        /* ---- Contenu principal ---- */
        main {
            flex: 1;
            padding: 1.5rem 2rem;
            max-width: 100%;
            overflow-x: hidden;
        }
        main h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b2b4a;
            border-bottom: 3px solid #facc15;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        main h2 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #475569;
        }
        .result-count {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1e293b;
            margin-left: auto;
            white-space: nowrap;
        }

        /* Carte semaine */
        .week-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #facc15;
            transition: 0.15s;
            overflow: hidden;
        }
        .week-card:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
            gap: 0.3rem;
        }
        .week-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b2b4a;
            word-break: break-word;
        }
        .week-header .badge {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
        }
        .week-title {
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.8rem;
            background: #f1f5f9;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            word-break: break-word;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem;
            margin-top: 0.3rem;
        }
        .content-block {
            background: #f8fafc;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            min-width: 0;
        }
        .content-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #475569;
            margin-bottom: 0.2rem;
            font-weight: 700;
        }
        .content-block ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .content-block li {
            font-size: 0.85rem;
            padding: 0.15rem 0;
            border-bottom: 1px dashed #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem 0.5rem;
            word-break: break-word;
        }
        .content-block li:last-child {
            border-bottom: none;
        }
        .tag {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.05rem 0.4rem;
            border-radius: 30px;
            background: #e2e8f0;
            color: #1e293b;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tag.coeur {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.retrouver {
            background: #dbeafe;
            color: #1e40af;
        }
        .tag.facile {
            background: #dcfce7;
            color: #166534;
        }
        .tag.moyen-f {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.moyen-d {
            background: #fde68a;
            color: #92400e;
        }
        .tag.difficile {
            background: #fecaca;
            color: #991b1b;
        }
        .tag.tres-d {
            background: #fca5a5;
            color: #7f1d1d;
        }

        .formula-latex {
            background: #f1f5f9;
            padding: 0.05rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #64748b;
        }

        /* Responsive */
        @media (max-width: 820px) {
            body {
                flex-direction: column;
            }
            nav.sidebar {
                width: 100%;
                min-height: auto;
                max-height: none;
                position: relative;
                padding: 1rem;
                box-shadow: none;
                border-bottom: 2px solid #facc15;
            }
            main {
                padding: 1rem;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
            .filter-row {
                flex-wrap: wrap;
            }
            .filter-row .search-group {
                flex: 1 1 100%;
                min-width: 0;
            }
            main h2 {
                font-size: 1.3rem;
            }
            .week-card {
                padding: 1rem;
            }
            .result-count {
                white-space: normal;
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .week-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .week-header .badge {
                align-self: flex-start;
            }
            .content-block li {
                font-size: 0.8rem;
            }
            .tag {
                font-size: 0.55rem;
                padding: 0.05rem 0.3rem;
            }
        }

        img,
        svg,
        canvas {
            max-width: 100%;
            height: auto;
        }
        pre,
        code {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .math {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <!-- ===== MENU VERTICAL ===== -->
    <nav class="sidebar" id="sidebar">
        <h1>📐 Maths Complémentaires</h1>
        <div class="sub">T<sup>le</sup> Générale – 2026/2027</div>

        <div class="search-group">
            <label for="searchSemaine">🔍 Semaine / Thème</label>
            <input type="text" id="searchSemaine" placeholder="ex: suites, logarithme..." />
        </div>

        <div class="search-group">
            <label for="searchKeyword">🔎 Mot‑clé</label>
            <input type="text" id="searchKeyword" placeholder="primitive, binomiale, Gini..." />
        </div>

        <div class="filter-row">
            <div class="search-group">
                <label for="filterDifficulte">Difficulté</label>
                <select id="filterDifficulte">
                    <option value="">Toutes</option>
                    <option value="facile">Facile</option>
                    <option value="moyen-f">Moyennement facile</option>
                    <option value="moyen-d">Moyennement difficile</option>
                    <option value="difficile">Difficile</option>
                    <option value="tres-d">Très difficile</option>
                </select>
            </div>
            <div class="search-group">
                <label for="filterType">Type</label>
                <select id="filterType">
                    <option value="">Tous</option>
                    <option value="savoir">Savoir</option>
                    <option value="savoir-faire">Savoir‑faire</option>
                    <option value="methode">Méthode</option>
                    <option value="formule">Formule</option>
                    <option value="lecon">Leçon</option>
                </select>
            </div>
        </div>

        <button class="btn-reset" id="btnReset">⟲ Réinitialiser les filtres</button>

        <div class="menu-stats">
            <span id="nbResultats">0</span> résultat(s) affiché(s)
        </div>
    </nav>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main id="mainContent">
        <h2>
            Programme hebdomadaire
            <small>Mathématiques complémentaires</small>
            <span class="result-count" id="resultCountBadge">0</span>
        </h2>
        <div id="cardsContainer"></div>
    </main>

    <script>
        // ============================================================
        // DONNÉES EXHAUSTIVES (reprise de la progression précédente)
        // ============================================================
        const DATA = [];

        // Fonction utilitaire pour créer une entrée de semaine
        function sem(weekRange, title, savoir = [], savoirFaire = [], methodes = [], formules = [],
            lecons = [], difficulteMap = {}) {
            const defaultDiff = 'moyen-f';
            const items = [];

            function pushItems(arr, type) {
                arr.forEach(text => {
                    const diff = difficulteMap[type] || difficulteMap[text] || defaultDiff;
                    let know = '';
                    if (diff === 'facile' || diff === 'moyen-f') know = 'à connaître par cœur';
                    else if (diff === 'moyen-d' || diff === 'difficile') know = 'à savoir retrouver';
                    else if (diff === 'tres-d') know = 'à savoir retrouver (démonstration)';
                    items.push({ text, type, difficulte: diff, know });
                });
            }
            pushItems(savoir, 'savoir');
            pushItems(savoirFaire, 'savoir-faire');
            pushItems(methodes, 'methode');
            pushItems(formules, 'formule');
            pushItems(lecons, 'lecon');

            return { weekRange, title, items };
        }

        // ----- Semaines 1-2 : Suites – limites, théorème des gendarmes -----
        DATA.push(sem('1-2', 'Suites : limites, théorème des gendarmes', [
            'Approche intuitive de la limite finie ou infinie d’une suite.',
            'Opérations sur les limites (somme, produit, quotient).',
            'Passage à la limite dans les inégalités.',
            'Théorème des gendarmes.'
        ], [
            'Calculer la limite d’une suite donnée par une formule explicite.',
            'Utiliser le théorème des gendarmes pour encadrer une limite.',
            'Représenter graphiquement une suite et conjecturer son comportement asymptotique.'
        ], [
            'Pour calculer une limite, identifier la forme indéterminée et factoriser par le terme dominant.',
            'Utiliser un encadrement pour appliquer le théorème des gendarmes.'
        ], [
            'Si $u_n \\leq v_n \\leq w_n$ et $\\lim u_n = \\lim w_n = \\ell$, alors $\\lim v_n = \\ell$.'
        ], [
            'Définition intuitive de la limite d’une suite.',
            'Opérations algébriques sur les limites.'
        ], { 'savoir': 'moyen-f', 'savoir-faire': 'moyen-d', 'methode': 'moyen-d', 'formule': 'coeur',
            'lecon': 'moyen-f' }));

        // ----- Semaines 3-4 : Suites géométriques, arithmético-géométriques -----
        DATA.push(sem('3-4', 'Suites géométriques et arithmético-géométriques', [
            'Limite d’une suite géométrique de raison positive.',
            'Limite de la somme des termes d’une suite géométrique de raison $0 \\leq q < 1$.',
            'Définition d’une suite arithmético-géométrique : $u_{n+1} = a u_n + b$.'
        ], [
            'Calculer la limite d’une suite géométrique.',
            'Calculer la somme des premiers termes d’une suite géométrique (quand $q \\neq 1$).',
            'Pour une suite arithmético-géométrique, trouver une solution particulière constante, puis exprimer $u_n$ en fonction de $n$.'
        ], [
            'Pour une suite arithmético-géométrique, on cherche $\\ell$ tel que $\\ell = a\\ell + b$, puis on pose $v_n = u_n - \\ell$ qui est géométrique.'
        ], [
            '$\\lim_{n\\to+\\infty} q^n = 0$ si $0 \\leq q < 1$, $= 1$ si $q=1$, $= +\\infty$ si $q>1$.',
            '$\\sum_{k=0}^{n} q^k = \\dfrac{1-q^{n+1}}{1-q}$ pour $q \\neq 1$.'
        ], [
            'Comportement asymptotique des suites géométriques.',
            'Résolution des suites arithmético-géométriques.'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-d' }));

        // ----- Semaines 5-6 : Continuité, TVI -----
        DATA.push(sem('5-6', 'Continuité, théorème des valeurs intermédiaires', [
            'Notion intuitive de continuité en un point et sur un intervalle.',
            'Une fonction dérivable sur un intervalle est continue (admis).',
            'Théorème des valeurs intermédiaires (admis).',
            'Cas des fonctions strictement monotones.'
        ], [
            'Utiliser le TVI pour prouver l’existence d’une solution à $f(x) = k$.',
            'Déterminer le nombre de solutions d’une équation $f(x)=k$ à l’aide du tableau de variation.',
            'Encadrer une solution et en donner une valeur approchée (balayage, dichotomie).'
        ], [
            'Pour appliquer le TVI, vérifier que $f$ est continue sur $[a,b]$ et que $k$ est entre $f(a)$ et $f(b)$.',
            'Si $f$ est strictement monotone, la solution est unique.'
        ], [], [
            'Définition de la continuité.',
            'Théorème des valeurs intermédiaires et ses applications.'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'lecon': 'moyen-d' }));

        // ----- Semaines 7-8 : Logarithme népérien -----
        DATA.push(sem('7-8', 'Logarithme népérien', [
            'La fonction logarithme népérien est la réciproque de la fonction exponentielle.',
            'Domaine de définition : $]0, +\\infty[$.',
            'Limites : $\\lim_{x\\to 0^+} \\ln x = -\\infty$, $\\lim_{x\\to +\\infty} \\ln x = +\\infty$.',
            'Équation fonctionnelle : $\\ln(ab) = \\ln a + \\ln b$.',
            'Dérivée : $(\\ln x)\' = \\dfrac{1}{x}$.'
        ], [
            'Utiliser l’équation fonctionnelle pour transformer des expressions.',
            'Résoudre des équations et inéquations faisant intervenir $\\ln$.',
            'Déterminer un seuil à l’aide de la relation $\\ln(q^n) = n \\ln q$.',
            'Calculer la dérivée de $\\ln(u(x))$ lorsque $u>0$.'
        ], [
            'Pour résoudre $\\ln(f(x)) = \\ln(g(x))$, on utilise la stricte croissance : $f(x)=g(x)$ avec $f>0, g>0$.'
        ], [
            '$\\ln(ab) = \\ln a + \\ln b$',
            '$\\ln\\left(\\dfrac{1}{a}\\right) = -\\ln a$',
            '$\\ln(a^r) = r \\ln a$ (pour $r \\in \\mathbb{Q}$)'
        ], [
            'Définition et propriétés du logarithme népérien.',
            'Lien avec l’exponentielle.',
            'Dérivée de $\\ln u$.'
        ], { 'savoir': 'difficile', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // ----- Semaines 9-10 : Dérivées composées -----
        DATA.push(sem('9-10', 'Dérivées : $f(ax+b)$, $e^{u(x)}$, $\\ln u(x)$, $u(x)^2$', [
            'Dérivée de $x \\mapsto f(ax+b)$ : $a \\cdot f\'(ax+b)$.',
            'Dérivée de $x \\mapsto e^{u(x)}$ : $u\'(x) e^{u(x)}$.',
            'Dérivée de $x \\mapsto \\ln u(x)$ : $\\dfrac{u\'(x)}{u(x)}$ (pour $u>0$).',
            'Dérivée de $x \\mapsto u(x)^2$ : $2 u\'(x) u(x)$.'
        ], [
            'Calculer des dérivées en utilisant ces formules.',
            'Étudier les variations d’une fonction à l’aide du signe de sa dérivée.'
        ], [
            'Pour dériver une fonction composée, identifier la fonction « extérieure » et la fonction « intérieure », puis appliquer la formule.'
        ], [
            '$(e^{u})\' = u\' e^{u}$',
            '$(\\ln u)\' = \\dfrac{u\'}{u}$',
            '$(u^2)\' = 2u\'u$'
        ], [
            'Dérivation des fonctions composées.',
            'Application à l’étude de fonctions.'
        ], { 'savoir': 'difficile', 'savoir-faire': 'tres-d', 'methode': 'tres-d', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // ----- Semaines 11-12 : Primitives, équations différentielles -----
        DATA.push(sem('11-12', 'Primitives, équations différentielles $y\' = ay + b$', [
            'Notion de primitive : $F\' = f$.',
            'Deux primitives d’une même fonction continue sur un intervalle diffèrent d’une constante.',
            'Équation différentielle $y\' = ay + b$ : solution générale $y(x) = C e^{ax} - \\dfrac{b}{a}$ (si $a \\neq 0$).',
            'Détermination de la solution vérifiant une condition initiale.'
        ], [
            'Vérifier qu’une fonction est solution d’une équation différentielle.',
            'Déterminer les primitives des fonctions usuelles (polynômes, $e^{ax+b}$, etc.).',
            'Résoudre $y\' = ay$ et $y\' = ay + b$.',
            'Reconnaître une fonction de la forme $2u\'u$, $e^{u}\'$, $u\'/u$ pour trouver une primitive.'
        ], [
            'Pour résoudre $y\' = ay + b$, on cherche une solution particulière constante, puis on utilise le principe de superposition.'
        ], [
            'Solution générale de $y\' = ay$ : $y = C e^{ax}$.',
            'Solution générale de $y\' = ay + b$ : $y = C e^{ax} - \\dfrac{b}{a}$ (pour $a \\neq 0$).'
        ], [
            'Définition et calcul de primitives.',
            'Résolution des équations différentielles linéaires du premier ordre à coefficients constants.'
        ], { 'savoir': 'tres-d', 'savoir-faire': 'tres-d', 'methode': 'tres-d', 'formule': 'coeur',
            'lecon': 'tres-d' }));

        // ----- Semaines 13-14 : Modèles d'évolution -----
        DATA.push(sem('13-14', 'Modèles d’évolution (discret/continu)', [
            'Modélisation de phénomènes dépendant du temps par des suites ou des fonctions.',
            'Mise en regard des modèles discrets et continus.'
        ], [
            'Construire un modèle discret (suite récurrente) à partir d’une situation.',
            'Passer d’un modèle discret à un modèle continu (et inversement) dans des cas simples.',
            'Utiliser la méthode d’Euler pour une résolution approchée d’une équation différentielle.'
        ], [
            'Pour un modèle discret $u_{n+1} = f(u_n)$, on peut étudier ses points fixes et sa stabilité.',
            'La méthode d’Euler : $y_{n+1} = y_n + h \\cdot f(t_n, y_n)$.'
        ], [], [
            'Modèles d’évolution (Malthus, Verhulst, radioactive, refroidissement).',
            'Comparaison discret/continu.'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'lecon': 'moyen-d' }));

        // ----- Semaines 15-16 : Convexité -----
        DATA.push(sem('15-16', 'Fonctions convexes', [
            'Dérivée seconde d’une fonction.',
            'Définition d’une fonction convexe : courbe au-dessus de ses sécantes (ou au-dessus de ses tangentes).',
            'Caractérisation : $f$ convexe sur $I$ ssi $f\'$ est croissante ssi $f\'\' \\geq 0$ sur $I$ (admis).',
            'Point d’inflexion : changement de convexité.'
        ], [
            'Reconnaître sur un graphique une fonction convexe, concave, un point d’inflexion.',
            'Étudier la convexité d’une fonction deux fois dérivable en étudiant le signe de $f\'\'$.'
        ], [
            'Pour étudier la convexité, on calcule $f\'\'$ et on détermine son signe.'
        ], [], [

        const container = document.getElementById('cardsContainer');
        const searchSemaine = document.getElementById('searchSemaine');
        const searchKeyword = document.getElementById('searchKeyword');
        const filterDifficulte = document.getElementById('filterDifficulte');
        const filterType = document.getElementById('filterType');
        const btnReset = document.getElementById('btnReset');
        const nbResultats = document.getElementById('nbResultats');
        const resultCountBadge = document.getElementById('resultCountBadge');

        function render() {
            const semaineFilter = searchSemaine.value.trim().toLowerCase();
            const keyword = searchKeyword.value.trim().toLowerCase();
            const diffFilter = filterDifficulte.value;
            const typeFilter = filterType.value;

            const filtered = DATA.filter(week => {
                if (semaineFilter) {
                    const matchTitle = week.title.toLowerCase().includes(semaineFilter);
                    const matchRange = week.weekRange.toLowerCase().includes(semaineFilter);
                    if (!matchTitle && !matchRange) return false;
                }
                if (keyword) {
                    const matchTitle = week.title.toLowerCase().includes(keyword);
                    const matchItems = week.items.some(item =>
                        item.text.toLowerCase().includes(keyword) ||
                        item.type.toLowerCase().includes(keyword)
                    );
                    if (!matchTitle && !matchItems) return false;
                }
                if (diffFilter) {
                    const hasDiff = week.items.some(item => item.difficulte === diffFilter);
                    if (!hasDiff) return false;
                }
                if (typeFilter) {
                    const hasType = week.items.some(item => item.type === typeFilter);
                    if (!hasType) return false;
                }
                return true;
            });

            nbResultats.textContent = filtered.length;
            resultCountBadge.textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Aucune semaine ne correspond à vos critères.</p>
                        <p style="font-size:0.9rem;color:#94a3b8;">Essayez de modifier les filtres.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(week => {
                const itemsByType = {
                    'savoir': [],
                    'savoir-faire': [],
                    'methode': [],
                    'formule': [],
                    'lecon': []
                };
                week.items.forEach(item => {
                    if (itemsByType[item.type]) itemsByType[item.type].push(item);
                });

                html += `
                    <div class="week-card">
                        <div class="week-header">
                            <h3>Semaine ${week.weekRange}</h3>
                            <span class="badge">${week.items.length} éléments</span>
                        </div>
                        <div class="week-title">${week.title}</div>
                        <div class="content-grid">
                `;

                const typeLabels = {
                    'savoir': '📘 Savoirs',
                    'savoir-faire': '🛠️ Savoir‑faire',
                    'methode': '🧠 Méthodes',
                    'formule': '📐 Formules',
                    'lecon': '📖 Leçons'
                };
                const typeOrder = ['savoir', 'savoir-faire', 'methode', 'formule', 'lecon'];

                typeOrder.forEach(type => {
                    const items = itemsByType[type] || [];
                    if (items.length === 0) return;
                    html += `
                        <div class="content-block">
                            <h4>${typeLabels[type] || type}</h4>
                            <ul>
                    `;
                    items.forEach(item => {
                        const diffLabel = {
                            'facile': 'Facile',
                            'moyen-f': 'Moyennement facile',
                            'moyen-d': 'Moyennement difficile',
                            'difficile': 'Difficile',
                            'tres-d': 'Très difficile',
                            'coeur': 'À connaître par cœur'
                        } [item.difficulte] || item.difficulte;

                        const tagClass = item.difficulte === 'coeur' ? 'coeur' :
                            item.know.includes('retrouver') ? 'retrouver' :
                            item.difficulte;

                        html += `
                            <li>
                                <span>${item.text}</span>
                                <span class="tag ${tagClass}">${diffLabel}</span>
                                ${item.know ? `<span style="font-size:0.65rem;color:#475569;">${item.know}</span>` : ''}
                            </li>
                        `;
                    });
                    html += `</ul></div>`;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        searchSemaine.addEventListener('input', render);
        searchKeyword.addEventListener('input', render);
        filterDifficulte.addEventListener('change', render);
        filterType.addEventListener('change', render);
        btnReset.addEventListener('click', () => {
            searchSemaine.value = '';
            searchKeyword.value = '';
            filterDifficulte.value = '';
            filterType.value = '';
            render();
        });

        render();
    </script>
