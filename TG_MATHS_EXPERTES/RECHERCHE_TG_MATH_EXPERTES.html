<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Maths Expertes Tle Générale 2026-2027</title>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async>
    </script>
    <style>
        /* ===== CSS issu de RECHERCHE_MC_TG.html ===== */
        /* Reset & box-sizing */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fb;
            color: #1e293b;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---- Menu vertical ---- */
        nav.sidebar {
            width: 280px;
            min-height: 100vh;
            background: #0b2b4a;
            color: #e2e8f0;
            padding: 1.5rem 1rem;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            align-self: flex-start;
            overflow-y: auto;
            max-height: 100vh;
            flex-shrink: 0;
            transition: width 0.2s;
        }

        nav.sidebar h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 0.2rem;
            color: #facc15;
            word-break: break-word;
        }
        nav.sidebar .sub {
            font-size: 0.75rem;
            opacity: 0.75;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.6rem;
        }
        .search-group {
            margin-bottom: 1.2rem;
        }
        .search-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #94a3b8;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }
        .search-group input,
        .search-group select {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            border: none;
            background: #1e3a5f;
            color: #f1f5f9;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            max-width: 100%;
        }
        .search-group input::placeholder {
            color: #94a3b8;
        }
        .search-group input:focus,
        .search-group select:focus {
            background: #2a4a72;
            box-shadow: 0 0 0 2px #facc15;
        }
        .filter-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-row .search-group {
            flex: 1 1 45%;
            min-width: 100px;
        }
        .btn-reset {
            background: #facc15;
            color: #0b2b4a;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.2rem;
        }
        .btn-reset:hover {
            background: #fde047;
        }
        .menu-stats {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid #334155;
            padding-top: 0.8rem;
            word-break: break-word;
        }
        .menu-stats span {
            display: inline-block;
            background: #1e3a5f;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            color: #e2e8f0;
            margin-right: 0.2rem;
        }

        /* ---- Contenu principal ---- */
        main {
            flex: 1;
            padding: 1.5rem 2rem;
            max-width: 100%;
            overflow-x: hidden;
        }
        main h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b2b4a;
            border-bottom: 3px solid #facc15;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        main h2 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #475569;
        }
        .result-count {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1e293b;
            margin-left: auto;
            white-space: nowrap;
        }

        /* Carte semaine */
        .week-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #facc15;
            transition: 0.15s;
            overflow: hidden;
        }
        .week-card:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
            gap: 0.3rem;
        }
        .week-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b2b4a;
            word-break: break-word;
        }
        .week-header .badge {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
        }
        .week-title {
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.8rem;
            background: #f1f5f9;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            word-break: break-word;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem;
            margin-top: 0.3rem;
        }
        .content-block {
            background: #f8fafc;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            min-width: 0;
        }
        .content-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #475569;
            margin-bottom: 0.2rem;
            font-weight: 700;
        }
        .content-block ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .content-block li {
            font-size: 0.85rem;
            padding: 0.15rem 0;
            border-bottom: 1px dashed #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem 0.5rem;
            word-break: break-word;
        }
        .content-block li:last-child {
            border-bottom: none;
        }
        .tag {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.05rem 0.4rem;
            border-radius: 30px;
            background: #e2e8f0;
            color: #1e293b;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tag.coeur {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.retrouver {
            background: #dbeafe;
            color: #1e40af;
        }
        .tag.facile {
            background: #dcfce7;
            color: #166534;
        }
        .tag.moyen-f {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.moyen-d {
            background: #fde68a;
            color: #92400e;
        }
        .tag.difficile {
            background: #fecaca;
            color: #991b1b;
        }
        .tag.tres-d {
            background: #fca5a5;
            color: #7f1d1d;
        }

        .formula-latex {
            background: #f1f5f9;
            padding: 0.05rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #64748b;
        }

        /* Responsive */
        @media (max-width: 820px) {
            body {
                flex-direction: column;
            }
            nav.sidebar {
                width: 100%;
                min-height: auto;
                max-height: none;
                position: relative;
                padding: 1rem;
                box-shadow: none;
                border-bottom: 2px solid #facc15;
            }
            main {
                padding: 1rem;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
            .filter-row {
                flex-wrap: wrap;
            }
            .filter-row .search-group {
                flex: 1 1 100%;
                min-width: 0;
            }
            main h2 {
                font-size: 1.3rem;
            }
            .week-card {
                padding: 1rem;
            }
            .result-count {
                white-space: normal;
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .week-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .week-header .badge {
                align-self: flex-start;
            }
            .content-block li {
                font-size: 0.8rem;
            }
            .tag {
                font-size: 0.55rem;
                padding: 0.05rem 0.3rem;
            }
        }

        img,
        svg,
        canvas {
            max-width: 100%;
            height: auto;
        }
        pre,
        code {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .math {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <!-- ===== MENU VERTICAL ===== -->
    <nav class="sidebar" id="sidebar">
        <h1>📐 Maths Expertes</h1>
        <div class="sub">T<sup>le</sup> Générale – 2026/2027</div>

        <div class="search-group">
            <label for="searchSemaine">🔍 Semaine / Thème</label>
            <input type="text" id="searchSemaine" placeholder="ex: complexes, arithmétique..." />
        </div>

        <div class="search-group">
            <label for="searchKeyword">🔎 Mot‑clé</label>
            <input type="text" id="searchKeyword" placeholder="module, Bézout, Markov..." />
        </div>

        <div class="filter-row">
            <div class="search-group">
                <label for="filterDifficulte">Difficulté</label>
                <select id="filterDifficulte">
                    <option value="">Toutes</option>
                    <option value="facile">Facile</option>
                    <option value="moyen-f">Moyennement facile</option>
                    <option value="moyen-d">Moyennement difficile</option>
                    <option value="difficile">Difficile</option>
                    <option value="tres-d">Très difficile</option>
                    <option value="coeur">À connaître par cœur</option>
                </select>
            </div>
            <div class="search-group">
                <label for="filterType">Type</label>
                <select id="filterType">
                    <option value="">Tous</option>
                    <option value="savoir">Savoir</option>
                    <option value="savoir-faire">Savoir‑faire</option>
                    <option value="methode">Méthode</option>
                    <option value="formule">Formule</option>
                    <option value="lecon">Leçon</option>
                </select>
            </div>
        </div>

        <button class="btn-reset" id="btnReset">⟲ Réinitialiser les filtres</button>

        <div class="menu-stats">
            <span id="nbResultats">0</span> résultat(s) affiché(s)
        </div>
    </nav>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main id="mainContent">
        <h2>
            Programme hebdomadaire
            <small>Mathématiques expertes</small>
            <span class="result-count" id="resultCountBadge">0</span>
        </h2>
        <div id="cardsContainer"></div>
    </main>

    <script>
        // ============================================================
        // DONNÉES EXHAUSTIVES – avec formules échappées pour MathJax
        // ============================================================
        const DATA = [];

        // Fonction utilitaire pour créer une entrée de semaine
        // Les formules LaTeX doivent être écrites avec des \( ... \) et les backslashes échappés (\\)
        function sem(weekRange, title, savoir = [], savoirFaire = [], methodes = [], formules = [],
            lecons = [], difficulteMap = {}) {
            const defaultDiff = 'moyen-f';
            const items = [];

            function pushItems(arr, type) {
                arr.forEach(text => {
                    const diff = difficulteMap[type] || difficulteMap[text] || defaultDiff;
                    let know = '';
                    if (diff === 'coeur' || diff === 'facile') know = 'à connaître par cœur';
                    else if (diff === 'moyen-f' || diff === 'moyen-d') know = 'à savoir retrouver';
                    else if (diff === 'difficile' || diff === 'tres-d') know = 'à savoir retrouver (démonstration)';
                    items.push({ text, type, difficulte: diff, know });
                });
            }
            pushItems(savoir, 'savoir');
            pushItems(savoirFaire, 'savoir-faire');
            pushItems(methodes, 'methode');
            pushItems(formules, 'formule');
            pushItems(lecons, 'lecon');

            return { weekRange, title, items };
        }

        // ----- Semaines 1-2 : Nombres complexes – point de vue algébrique -----
        DATA.push(sem('1-2', 'Nombres complexes : algèbre',
            [
                'Ensemble \\(\\mathbb{C}\\) des nombres complexes. Partie réelle et imaginaire.',
                'Opérations (addition, multiplication) dans \\(\\mathbb{C}\\).',
                'Conjugaison : \\(\\overline{z}=a-ib\\). Propriétés algébriques.',
                'Inverse d’un nombre complexe non nul.',
                'Formule du binôme dans \\(\\mathbb{C}\\).'
            ],
            [
                'Effectuer des calculs algébriques avec des nombres complexes.',
                'Résoudre une équation linéaire \\(az = b\\).',
                'Résoudre une équation simple faisant intervenir \\(z\\) et \\(\\overline{z}\\).'
            ],
            [
                'Pour résoudre \\(az+b\\overline{z}=c\\), poser \\(z=x+iy\\) et séparer parties réelle et imaginaire.'
            ],
            [
                '\\(\\overline{z_1+z_2}=\\overline{z_1}+\\overline{z_2}\\)',
                '\\(\\overline{z_1 z_2}=\\overline{z_1}\\cdot\\overline{z_2}\\)',
                '\\(\\overline{(z)^n}=(\\overline{z})^n\\)',
                '\\(\\overline{1/z}=1/\\overline{z}\\) pour \\(z\\neq0\\)',
                '\\((a+b)^n = \\sum_{k=0}^n \\binom{n}{k} a^k b^{n-k}\\) dans \\(\\mathbb{C}\\)'
            ],
            [
                'Définition de \\(\\mathbb{C}\\) et des opérations.',
                'Conjugaison et ses propriétés.',
                'Formule du binôme.'
            ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'moyen-d', 'formule': 'coeur',
                'lecon': 'facile' }
        ));

        // ----- Semaines 3-4 : Module, argument, forme trigonométrique -----
        DATA.push(sem('3-4', 'Module, argument, forme trigonométrique',
            [
                'Module d’un nombre complexe : \\(|z| = \\sqrt{a^2+b^2}\\). Interprétation géométrique.',
                'Relation \\(|z|^2 = z\\overline{z}\\).',
                'Module d’un produit, d’un inverse.',
                'Ensemble \\(\\mathbb{U}\\) des complexes de module 1, stabilité par produit et inverse.',
                'Arguments d’un complexe non nul, interprétation géométrique.',
                'Forme trigonométrique : \\(z = r(\\cos\\theta + i\\sin\\theta)\\).'
            ],
            [
                'Déterminer le module et les arguments d’un nombre complexe.',
                'Représenter un complexe par un point. Déterminer l’affixe d’un point.',
                'Passer de la forme algébrique à la forme trigonométrique et inversement.'
            ],
            [
                'Pour trouver un argument, on utilise \\(\\cos\\theta = \\frac{a}{r}\\), \\(\\sin\\theta = \\frac{b}{r}\\) avec \\(r=|z|\\).'
            ],
            [
                '\\(|z|^2 = z\\overline{z}\\)',
                '\\(|z_1 z_2| = |z_1|\\,|z_2|\\)',
                '\\(|1/z| = 1/|z|\\) pour \\(z\\neq0\\)',
                '\\(|z^n| = |z|^n\\)'
            ],
            [
                'Définition du module et de l’argument.',
                'Interprétation géométrique.',
                'Forme trigonométrique.'
            ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'moyen-d', 'formule': 'coeur',
                'lecon': 'facile' }
        ));

        // ----- Semaines 5-6 : Formules d’Euler, de Moivre, trigonométrie -----
        DATA.push(sem('5-6', 'Exponentielle imaginaire, Euler, Moivre',
            [
                'Exponentielle imaginaire : \\(e^{i\\theta} = \\cos\\theta + i\\sin\\theta\\).',
                'Relation fonctionnelle : \\(e^{i(\\theta+\\varphi)} = e^{i\\theta}e^{i\\varphi}\\).',
                'Formes exponentielles d’un complexe : \\(z = r e^{i\\theta}\\).',
                'Formules d’Euler : \\(\\cos\\theta = \\frac{e^{i\\theta}+e^{-i\\theta}}{2}\\), \\(\\sin\\theta = \\frac{e^{i\\theta}-e^{-i\\theta}}{2i}\\).',
                'Formule de Moivre : \\((\\cos\\theta + i\\sin\\theta)^n = \\cos(n\\theta) + i\\sin(n\\theta)\\).'
            ],
            [
                'Passer de la forme algébrique à la forme exponentielle et inversement.',
                'Effectuer des calculs en choisissant la forme adaptée.',
                'Utiliser les formules d’Euler et de Moivre pour transformer des expressions trigonométriques (linéarisation, calcul de puissances).'
            ],
            [
                'Pour linéariser \\(\\cos^n\\theta\\) ou \\(\\sin^n\\theta\\), on utilise les formules d’Euler.',
                'Pour calculer \\((a+ib)^n\\), on passe en forme exponentielle.'
            ],
            [
                '\\(\\cos\\theta = \\frac{e^{i\\theta}+e^{-i\\theta}}{2}\\)',
                '\\(\\sin\\theta = \\frac{e^{i\\theta}-e^{-i\\theta}}{2i}\\)',
                '\\((\\cos\\theta + i\\sin\\theta)^n = \\cos(n\\theta) + i\\sin(n\\theta)\\)',
                'Formules d’addition : \\(\\cos(a+b)=\\cos a\\cos b - \\sin a\\sin b\\), etc.'
            ],
            [
                'Exponentielle imaginaire.',
                'Formules d’Euler et de Moivre.',
                'Linéarisation et calcul de puissances.'
            ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
                'lecon': 'moyen-d' }
        ));

        // ----- Semaines 7-8 : Équations polynomiales, factorisation -----
        DATA.push(sem('7-8', 'Équations polynomiales (second degré, factorisation)',
            [
                'Solutions complexes d’une équation du second degré à coefficients réels (\\(\\Delta<0\\)).',
                'Factorisation de \\(z^n - a^n\\) par \\(z-a\\).',
                'Si \\(P\\) est un polynôme et \\(P(a)=0\\), factorisation de \\(P\\) par \\(z-a\\).',
                'Un polynôme de degré \\(n\\) admet au plus \\(n\\) racines.'
            ],
            [
                'Résoudre une équation polynomiale de degré 2 à coefficients réels (discriminant négatif).',
                'Résoudre une équation de degré 3 à coefficients réels dont une racine est connue.',
                'Factoriser un polynôme dont une racine est connue.'
            ],
            [
                'Pour factoriser un polynôme connaissant une racine, on effectue la division par \\((z-a)\\).'
            ],
            [
                '\\(z^n - a^n = (z-a)(z^{n-1}+az^{n-2}+\\dots+a^{n-1})\\)',
                'Si \\(\\Delta<0\\), racines : \\(\\frac{-b \\pm i\\sqrt{-\\Delta}}{2a}\\)'
            ],
            [
                'Factorisation des polynômes.',
                'Théorème : au plus \\(n\\) racines.'
            ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
                'lecon': 'moyen-d' }
        ));

        // ----- Semaines 9-10 : Arithmétique – divisibilité, congruences -----
        DATA.push(sem('9-10', 'Arithmétique : divisibilité, congruences',
            [
                'Divisibilité dans \\(\\mathbb{Z}\\).',
                'Division euclidienne d’un élément de \\(\\mathbb{Z}\\) par un élément de \\(\\mathbb{N}^*\\).',
                'Congruences dans \\(\\mathbb{Z}\\). Compatibilité avec les opérations.'
            ],
            [
                'Déterminer les diviseurs d’un entier.',
                'Résoudre une congruence \\(ax \\equiv b \\pmod n\\).',
                'Déterminer un inverse de \\(a\\) modulo \\(n\\) lorsque \\(a\\) et \\(n\\) sont premiers entre eux.',
                'Établir et utiliser des tests de divisibilité.'
            ],
            [
                'Pour résoudre \\(ax \\equiv b \\pmod n\\), on utilise l’inverse de \\(a\\) modulo \\(n\\) (si \\(a\\) et \\(n\\) sont premiers entre eux).'
            ],
            [
                'Si \\(a \\equiv b \\pmod n\\) et \\(c \\equiv d \\pmod n\\), alors \\(a+c \\equiv b+d\\) et \\(ac \\equiv bd \\pmod n\\).',
                'Si \\(a\\) et \\(n\\) sont premiers entre eux, \\(a\\) admet un inverse modulo \\(n\\).'
            ],
            [
                'Divisibilité et division euclidienne.',
                'Congruences et leurs propriétés.'
            ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'moyen-d', 'formule': 'coeur',
                'lecon': 'facile' }
        ));

        // ----- Semaines 11-12 : PGCD, Bézout, Gauss -----
        DATA.push(sem('11-12', 'PGCD, théorèmes de Bézout et Gauss',
            [
                'PGCD de deux entiers. Algorithme d’Euclide.',
                'Couples d’entiers premiers entre eux.',
                'Théorème de Bézout : \\(au+bv = \\mathrm{PGCD}(a,b)\\).',
                'Théorème de Gauss : si \\(a\\mid bc\\) et \\(a\\) premier avec \\(b\\), alors \\(a\\mid c\\).'
            ],
            [
                'Calculer le PGCD de deux entiers par l’algorithme d’Euclide.',
                'Trouver un couple de Bézout \\((u,v)\\) pour deux entiers premiers entre eux.',
                'Résoudre des équations diophantiennes simples du type \\(ax+by=c\\).'
            ],
            [
                'Pour résoudre \\(ax+by=c\\), on commence par diviser \\(c\\) par le PGCD de \\(a\\) et \\(b\\). Si la divisibilité est vérifiée, on utilise une solution particulière obtenue par Bézout.'
            ],
            [
                'Théorème de Bézout : \\(\\exists u,v \\in \\mathbb{Z}, au+bv = \\mathrm{PGCD}(a,b)\\).',
                'Théorème de Gauss : si \\(\\mathrm{PGCD}(a,b)=1\\) et \\(a\\mid bc\\), alors \\(a\\mid c\\).'
            ],
            [
                'PGCD et algorithme d’Euclide.',
                'Théorème de Bézout.',
                'Théorème de Gauss.',
                'Équations diophantiennes.'
            ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',

        // RENDU DYNAMIQUE

        const container = document.getElementById('cardsContainer');
        const searchSemaine = document.getElementById('searchSemaine');
        const searchKeyword = document.getElementById('searchKeyword');
        const filterDifficulte = document.getElementById('filterDifficulte');
        const filterType = document.getElementById('filterType');
        const btnReset = document.getElementById('btnReset');
        const nbResultats = document.getElementById('nbResultats');
        const resultCountBadge = document.getElementById('resultCountBadge');

        function render() {
            const semaineFilter = searchSemaine.value.trim().toLowerCase();
            const keyword = searchKeyword.value.trim().toLowerCase();
            const diffFilter = filterDifficulte.value;
            const typeFilter = filterType.value;

            const filtered = DATA.filter(week => {
                if (semaineFilter) {
                    const matchTitle = week.title.toLowerCase().includes(semaineFilter);
                    const matchRange = week.weekRange.toLowerCase().includes(semaineFilter);
                    if (!matchTitle && !matchRange) return false;
                }
                if (keyword) {
                    const matchTitle = week.title.toLowerCase().includes(keyword);
                    const matchItems = week.items.some(item =>
                        item.text.toLowerCase().includes(keyword) ||
                        item.type.toLowerCase().includes(keyword)
                    );
                    if (!matchTitle && !matchItems) return false;
                }
                if (diffFilter) {
                    const hasDiff = week.items.some(item => item.difficulte === diffFilter);
                    if (!hasDiff) return false;
                }
                if (typeFilter) {
                    const hasType = week.items.some(item => item.type === typeFilter);
                    if (!hasType) return false;
                }
                return true;
            });

            nbResultats.textContent = filtered.length;
            resultCountBadge.textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Aucune semaine ne correspond à vos critères.</p>
                        <p style="font-size:0.9rem;color:#94a3b8;">Essayez de modifier les filtres.</p>
                    </div>
                `;
                // Forcer le rendu MathJax sur le contenu vide (pas nécessaire)
                if (window.MathJax && MathJax.typesetPromise) {
                    MathJax.typesetPromise();
                }
                return;
            }

            let html = '';
            filtered.forEach(week => {
                const itemsByType = {
                    'savoir': [],
                    'savoir-faire': [],
                    'methode': [],
                    'formule': [],
                    'lecon': []
                };
                week.items.forEach(item => {
                    if (itemsByType[item.type]) itemsByType[item.type].push(item);
                });

                html += `
                    <div class="week-card">
                        <div class="week-header">
                            <h3>Semaine ${week.weekRange}</h3>
                            <span class="badge">${week.items.length} éléments</span>
                        </div>
                        <div class="week-title">${week.title}</div>
                        <div class="content-grid">
                `;

                const typeLabels = {
                    'savoir': '📘 Savoirs',
                    'savoir-faire': '🛠️ Savoir‑faire',
                    'methode': '🧠 Méthodes',
                    'formule': '📐 Formules',
                    'lecon': '📖 Leçons'
                };
                const typeOrder = ['savoir', 'savoir-faire', 'methode', 'formule', 'lecon'];

                typeOrder.forEach(type => {
                    const items = itemsByType[type] || [];
                    if (items.length === 0) return;
                    html += `
                        <div class="content-block">
                            <h4>${typeLabels[type] || type}</h4>
                            <ul>
                    `;
                    items.forEach(item => {
                        const diffLabel = {
                            'facile': 'Facile',
                            'moyen-f': 'Moyennement facile',
                            'moyen-d': 'Moyennement difficile',
                            'difficile': 'Difficile',
                            'tres-d': 'Très difficile',
                            'coeur': 'À connaître par cœur'
                        } [item.difficulte] || item.difficulte;

                        const tagClass = item.difficulte === 'coeur' ? 'coeur' :
                            (item.know.includes('retrouver') ? 'retrouver' :
                                (item.difficulte || 'moyen-f'));

                        html += `
                            <li>
                                <span>${item.text}</span>
                                <span class="tag ${tagClass}">${diffLabel}</span>
                                ${item.know ? `<span style="font-size:0.65rem;color:#475569;">${item.know}</span>` : ''}
                            </li>
                        `;
                    });
                    html += `</ul></div>`;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // Forcer le rendu MathJax sur le nouveau contenu
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        // Événements
        searchSemaine.addEventListener('input', render);
        searchKeyword.addEventListener('input', render);
        filterDifficulte.addEventListener('change', render);
        filterType.addEventListener('change', render);
        btnReset.addEventListener('click', () => {
            searchSemaine.value = '';
            searchKeyword.value = '';
            filterDifficulte.value = '';
            filterType.value = '';
            render();
        });

        // Premier rendu
        render();
    </script>
