<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Terminale STI2D (PCM) - Programme 2026-2027</title>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async>
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fb;
            color: #1e293b;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---- Menu vertical ---- */
        nav.sidebar {
            width: 280px;
            min-height: 100vh;
            background: #0b2b4a;
            color: #e2e8f0;
            padding: 1.5rem 1rem;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            align-self: flex-start;
            overflow-y: auto;
            max-height: 100vh;
            flex-shrink: 0;
            transition: width 0.2s;
        }

        nav.sidebar h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 0.2rem;
            color: #facc15;
            word-break: break-word;
        }
        nav.sidebar .sub {
            font-size: 0.75rem;
            opacity: 0.75;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.6rem;
        }
        .search-group {
            margin-bottom: 1.2rem;
        }
        .search-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #94a3b8;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }
        .search-group input,
        .search-group select {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            border: none;
            background: #1e3a5f;
            color: #f1f5f9;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            max-width: 100%;
        }
        .search-group input::placeholder {
            color: #94a3b8;
        }
        .search-group input:focus,
        .search-group select:focus {
            background: #2a4a72;
            box-shadow: 0 0 0 2px #facc15;
        }
        .filter-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-row .search-group {
            flex: 1 1 45%;
            min-width: 100px;
        }
        .btn-reset {
            background: #facc15;
            color: #0b2b4a;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.2rem;
        }
        .btn-reset:hover {
            background: #fde047;
        }
        .menu-stats {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid #334155;
            padding-top: 0.8rem;
            word-break: break-word;
        }
        .menu-stats span {
            display: inline-block;
            background: #1e3a5f;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            color: #e2e8f0;
            margin-right: 0.2rem;
        }

        /* ---- Contenu principal ---- */
        main {
            flex: 1;
            padding: 1.5rem 2rem;
            max-width: 100%;
            overflow-x: hidden;
        }
        main h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b2b4a;
            border-bottom: 3px solid #facc15;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }
        main h2 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #475569;
        }
        .result-count {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1e293b;
            margin-left: auto;
            white-space: nowrap;
        }

        /* Carte semaine */
        .week-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #facc15;
            transition: 0.15s;
            overflow: hidden;
        }
        .week-card:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
            gap: 0.3rem;
        }
        .week-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0b2b4a;
            word-break: break-word;
        }
        .week-header .badge {
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
        }
        .week-title {
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 0.8rem;
            background: #f1f5f9;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            word-break: break-word;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem;
            margin-top: 0.3rem;
        }
        .content-block {
            background: #f8fafc;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            min-width: 0;
        }
        .content-block h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #475569;
            margin-bottom: 0.2rem;
            font-weight: 700;
        }
        .content-block ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .content-block li {
            font-size: 0.85rem;
            padding: 0.15rem 0;
            border-bottom: 1px dashed #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem 0.5rem;
            word-break: break-word;
        }
        .content-block li:last-child {
            border-bottom: none;
        }
        .tag {
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.05rem 0.4rem;
            border-radius: 30px;
            background: #e2e8f0;
            color: #1e293b;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tag.coeur {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.retrouver {
            background: #dbeafe;
            color: #1e40af;
        }
        .tag.facile {
            background: #dcfce7;
            color: #166534;
        }
        .tag.moyen-f {
            background: #fef9c3;
            color: #854d0e;
        }
        .tag.moyen-d {
            background: #fde68a;
            color: #92400e;
        }
        .tag.difficile {
            background: #fecaca;
            color: #991b1b;
        }
        .tag.tres-d {
            background: #fca5a5;
            color: #7f1d1d;
        }

        .formula-latex {
            background: #f1f5f9;
            padding: 0.05rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #64748b;
        }

        /* Responsive */
        @media (max-width: 820px) {
            body {
                flex-direction: column;
            }
            nav.sidebar {
                width: 100%;
                min-height: auto;
                max-height: none;
                position: relative;
                padding: 1rem;
                box-shadow: none;
                border-bottom: 2px solid #facc15;
            }
            main {
                padding: 1rem;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
            .filter-row {
                flex-wrap: wrap;
            }
            .filter-row .search-group {
                flex: 1 1 100%;
                min-width: 0;
            }
            main h2 {
                font-size: 1.3rem;
            }
            .week-card {
                padding: 1rem;
            }
            .result-count {
                white-space: normal;
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .week-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .week-header .badge {
                align-self: flex-start;
            }
            .content-block li {
                font-size: 0.8rem;
            }
            .tag {
                font-size: 0.55rem;
                padding: 0.05rem 0.3rem;
            }
        }

        img,
        svg,
        canvas {
            max-width: 100%;
            height: auto;
        }
        pre,
        code {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .math {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <!-- ===== MENU VERTICAL ===== -->
    <nav class="sidebar" id="sidebar">
        <h1>📐 Maths T<sup>le</sup> STI2D</h1>
        <div class="sub">Spécialité PCM – 2026/2027</div>

        <div class="search-group">
            <label for="searchSemaine">🔍 Semaine / Thème</label>
            <input type="text" id="searchSemaine" placeholder="ex: intégrale, exponentielle..." />
        </div>

        <div class="search-group">
            <label for="searchKeyword">🔎 Mot‑clé</label>
            <input type="text" id="searchKeyword" placeholder="primitive, log, équation diff..." />
        </div>

        <div class="filter-row">
            <div class="search-group">
                <label for="filterDifficulte">Difficulté</label>
                <select id="filterDifficulte">
                    <option value="">Toutes</option>
                    <option value="facile">Facile</option>
                    <option value="moyen-f">Moyennement facile</option>
                    <option value="moyen-d">Moyennement difficile</option>
                    <option value="difficile">Difficile</option>
                    <option value="tres-d">Très difficile</option>
                </select>
            </div>
            <div class="search-group">
                <label for="filterType">Type</label>
                <select id="filterType">
                    <option value="">Tous</option>
                    <option value="savoir">Savoir</option>
                    <option value="savoir-faire">Savoir‑faire</option>
                    <option value="methode">Méthode</option>
                    <option value="formule">Formule</option>
                    <option value="lecon">Leçon</option>
                </select>
            </div>
        </div>

        <button class="btn-reset" id="btnReset">⟲ Réinitialiser les filtres</button>

        <div class="menu-stats">
            <span id="nbResultats">0</span> résultat(s) affiché(s)
        </div>
    </nav>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <main id="mainContent">
        <h2>
            Programme hebdomadaire
            <small>spécialité PCM</small>
            <span class="result-count" id="resultCountBadge">0</span>
        </h2>
        <div id="cardsContainer"></div>
    </main>

    <script>
        // ============================================================
        //  DONNÉES EXHAUSTIVES (issues du programme officiel PCM Terminale)
        // ============================================================
        const DATA = [];

        // Fonction utilitaire pour créer une entrée de semaine
        function sem(weekRange, title, savoir = [], savoirFaire = [], methodes = [], formules = [],
            lecons = [], difficulteMap = {}) {
            const defaultDiff = 'moyen-f';
            const items = [];

            function pushItems(arr, type) {
                arr.forEach(text => {
                    const diff = difficulteMap[type] || difficulteMap[text] || defaultDiff;
                    let know = '';
                    if (diff === 'facile' || diff === 'moyen-f') know = 'à connaître par cœur';
                    else if (diff === 'moyen-d' || diff === 'difficile') know = 'à savoir retrouver';
                    else if (diff === 'tres-d') know = 'à savoir retrouver (démonstration)';
                    items.push({ text, type, difficulte: diff, know });
                });
            }
            pushItems(savoir, 'savoir');
            pushItems(savoirFaire, 'savoir-faire');
            pushItems(methodes, 'methode');
            pushItems(formules, 'formule');
            pushItems(lecons, 'lecon');

            return { weekRange, title, items };
        }

        // ============================================================
        //  CONSTRUCTION DES SEMAINES À PARTIR DU PROGRAMME PCM TERMINALE
        //  (Répartition indicative sur 36 semaines)
        // ============================================================

        // --- Semaines 1-4 : Intégration (définition, méthode des rectangles) ---
        DATA.push(sem('1-4', 'Intégration – définition, méthode des rectangles', [
            'Définition de l\'intégrale $\\int_a^b f(x) dx$ comme aire sous la courbe (pour $f \\geq 0$)',
            'Approximation d\'une intégrale par la méthode des rectangles',
            'Lien entre $\\sum_{i=1}^n f(x_i) \\Delta x_i$ et $\\int_a^b f(x) dx$',
            'Extension aux fonctions négatives et de signe variable',
            'Définition de $\\int_a^b f(x) dx$ lorsque $a > b$'
        ], [
            'Calculer l\'intégrale d\'une fonction sur un intervalle $[a;b]$',
            'Calculer la valeur moyenne d\'une fonction sur un intervalle',
            'Calculer une aire sous une courbe ou entre deux courbes'
        ], [
            'Utiliser la méthode des rectangles pour approcher une intégrale',
            'Appliquer la relation de Chasles $\\int_a^b f = \\int_a^c f + \\int_c^b f$'
        ], [
            '$\\int_a^b f(x) dx = F(b) - F(a)$ où $F$ est une primitive de $f$',
            'Linéarité : $\\int_a^b (\\alpha f + \\beta g) = \\alpha \\int_a^b f + \\beta \\int_a^b g$',
            'Positivité : si $f \\geq 0$ alors $\\int_a^b f \\geq 0$',
            'Valeur moyenne : $\\frac{1}{b-a} \\int_a^b f(x) dx$'
        ], [
            'Définition de l\'intégrale',
            'Propriétés de l\'intégrale (linéarité, positivité, croissance, Chasles)',
            'Méthode des rectangles'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-d' }));

        // --- Semaines 5-8 : Intégration (primitive, dérivée de l'intégrale) ---
        DATA.push(sem('5-8', 'Intégration – primitive, dérivée de l\'intégrale', [
            'Fonction $F(x) = \\int_a^x f(t) dt$ ; dérivée $F\'(x) = f(x)$',
            '$\\int_a^b f(x) dx = F(b) - F(a)$ où $F$ est une primitive',
            'Primitives des fonctions usuelles'
        ], [
            'Calculer une intégrale à l\'aide d\'une primitive',
            'Déterminer la primitive vérifiant une condition initiale'
        ], [
            'Reconnaître une primitive dans une expression',
            'Utiliser le tableau des primitives'
        ], [
            '$F(x) = \\int_a^x f(t) dt \\Rightarrow F\' = f$',
            '$\\int x^n dx = \\frac{x^{n+1}}{n+1} + C$ (pour $n \\neq -1$)',
            '$\\int \\cos x dx = \\sin x + C$, $\\int \\sin x dx = -\\cos x + C$',
            '$\\int e^x dx = e^x + C$'
        ], [
            'Théorème fondamental du calcul intégral',
            'Primitives des fonctions usuelles'
        ], { 'savoir': 'difficile', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // --- Semaines 9-12 : Fonction exponentielle de base e ---
        DATA.push(sem('9-12', 'Fonction exponentielle de base $e$', [
            'Nombre $e$ et fonction $x \\mapsto e^x$',
            'Dérivée de $x \\mapsto e^x$ et de $x \\mapsto e^{kx}$ ($k \\in \\mathbb{R}$)',
            'Courbe représentative',
            'Limites en $-\\infty$ et $+\\infty$',
            'Croissance comparée : $\\lim_{x \\to +\\infty} \\frac{x}{e^x} = 0$, $\\lim_{x \\to +\\infty} x^n e^{-x} = 0$'
        ], [
            'Utiliser les propriétés algébriques de l\'exponentielle pour transformer des expressions',
            'Étudier les variations de fonctions somme, produit ou quotient de $e^{kx}$ et de polynômes',
            'Déterminer les limites en $-\\infty$ et $+\\infty$ de telles fonctions'
        ], [
            'Utiliser $e^{a+b} = e^a e^b$, $e^{a-b} = \\frac{e^a}{e^b}$, $(e^a)^b = e^{ab}$',
            'Dériver $e^{u(x)}$ en utilisant $(e^u)\' = u\' e^u$'
        ], [
            '$e^0 = 1$',
            '$e^{a+b} = e^a \\cdot e^b$',
            '$e^{a-b} = \\frac{e^a}{e^b}$',
            '$(e^a)^b = e^{ab}$',
            '$(e^x)\' = e^x$',
            '$(e^{kx})\' = k e^{kx}$',
            '$\\lim_{x \\to -\\infty} e^x = 0$, $\\lim_{x \\to +\\infty} e^x = +\\infty$'
        ], [
            'Définition de la fonction exponentielle',
            'Propriétés algébriques',
            'Dérivée et limites'
        ], { 'savoir': 'moyen-d', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-d' }));

        // --- Semaines 13-16 : Logarithme népérien ---
        DATA.push(sem('13-16', 'Logarithme népérien', [
            'Définition : $\\ln(a)$ unique solution de $e^x = a$ pour $a > 0$',
            'Sens de variation : croissante',
            'Propriétés algébriques : $\\ln(ab) = \\ln a + \\ln b$, $\\ln(a/b) = \\ln a - \\ln b$, $\\ln(a^n) = n \\ln a$, $\\ln(\\sqrt{a}) = \\frac{1}{2} \\ln a$',
            'Lien avec le logarithme décimal',
            'Courbe représentative',
            'Limites en $0$ et $+\\infty$'
        ], [
            'Utiliser les propriétés algébriques du logarithme pour transformer des expressions',
            'Résoudre des équations et inéquations : $e^{ax} = b$, $e^{ax} > b$, $\\ln x = b$, $\\ln x > b$',
            'Étudier des fonctions somme, produit ou quotient de polynômes et de $\\ln x$'
        ], [
            'Utiliser $\\ln(e^x) = x$ et $e^{\\ln x} = x$',
            'Dériver $\\ln(u(x))$ en utilisant $(\\ln u)\' = \\frac{u\'}{u}$'
        ], [
            '$\\ln(ab) = \\ln a + \\ln b$',
            '$\\ln(a/b) = \\ln a - \\ln b$',
            '$\\ln(a^n) = n \\ln a$',
            '$\\ln(\\sqrt{a}) = \\frac{1}{2} \\ln a$',
            '$(\\ln x)\' = \\frac{1}{x}$',
            '$\\lim_{x \\to 0^+} \\ln x = -\\infty$, $\\lim_{x \\to +\\infty} \\ln x = +\\infty$'
        ], [
            'Définition du logarithme népérien',
            'Propriétés algébriques',
            'Dérivée et limites'
        ], { 'savoir': 'difficile', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // --- Semaines 17-20 : Équations différentielles ---
        DATA.push(sem('17-20', 'Équations différentielles $y\' = ay$ et $y\' = ay + b$', [
            'Notion d\'équation différentielle',
            'Équations $y\' = ay$',
            'Équations $y\' = ay + b$',
            'Solution générale et solution particulière'
        ], [
            'Vérifier qu\'une fonction donnée est solution',
            'Déterminer l\'ensemble des solutions de $y\' = ay + b$',
            'Déterminer la solution vérifiant une condition initiale $y(x_0)$'
        ], [
            'Résoudre $y\' = ay$ : $y = C e^{ax}$',
            'Résoudre $y\' = ay + b$ : solution particulière $y = -\\frac{b}{a}$ (si $a \\neq 0$)',
            'Utiliser la condition initiale pour déterminer $C$'
        ], [
            '$y\' = ay \\Rightarrow y = C e^{ax}$',
            '$y\' = ay + b \\Rightarrow y = C e^{ax} - \\frac{b}{a}$ (si $a \\neq 0$)',
            'Si $a = 0$, $y\' = b \\Rightarrow y = bx + C$'
        ], [
            'Définition d\'une équation différentielle',
            'Méthode de résolution des équations linéaires du premier ordre à coefficients constants'
        ], { 'savoir': 'difficile', 'savoir-faire': 'tres-d', 'methode': 'tres-d', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // --- Semaines 21-24 : Composition de fonctions ---
        DATA.push(sem('21-24', 'Composition de fonctions – dérivée et primitives', [
            'Définition de la composée $v \\circ u$',
            'Dérivée : $(v \\circ u)\' = u\' \\times (v\' \\circ u)$',
            'Primitive de $u\' f(u)$ en fonction d\'une primitive de $f$'
        ], [
            'Identifier la composée de deux fonctions dans une expression simple',
            'Calculer la dérivée de $x \\mapsto (u(x))^n$, $\\cos(u(x))$, $\\sin(u(x))$, $e^{u(x)}$, $\\ln(u(x))$',
            'Calculer des primitives de $u\' u^n$, $u\' e^u$, $u\' \\cos u$, $u\' \\sin u$'
        ], [
            'Utiliser la formule $(v \\circ u)\' = u\' \\times (v\' \\circ u)$',
            'Reconnaître $u\' f(u)$ pour trouver une primitive'
        ], [
            '$(u^n)\' = n u\' u^{n-1}$',
            '$\\cos(u)\' = -u\' \\sin(u)$',
            '$\\sin(u)\' = u\' \\cos(u)$',
            '$(e^u)\' = u\' e^u$',
            '$(\\ln u)\' = \\frac{u\'}{u}$',
            '$\\int u\' u^n dx = \\frac{u^{n+1}}{n+1} + C$ (pour $n \\neq -1$)',
            '$\\int u\' e^u dx = e^u + C$',
            '$\\int u\' \\cos u dx = \\sin u + C$',
            '$\\int u\' \\sin u dx = -\\cos u + C$'
        ], [
            'Dérivation des fonctions composées',
            'Primitives de la forme $u\' f(u)$'
        ], { 'savoir': 'difficile', 'savoir-faire': 'tres-d', 'methode': 'tres-d', 'formule': 'coeur',
            'lecon': 'difficile' }));

        // --- Semaines 25-28 : Nombres complexes (exponentielle complexe) ---
        DATA.push(sem('25-28', 'Nombres complexes – exponentielle complexe', [
            'Exponentielle complexe : $e^{i\\theta} = \\cos \\theta + i \\sin \\theta$',
            'Écriture d\'un nombre complexe non nul sous la forme $r e^{i\\theta}$ ($r > 0$)',
            'Formules d\'addition et de duplication des sinus et cosinus',
            'Linéarisation de $\\cos^2 \\theta$ et $\\sin^2 \\theta$',
            'Application aux calculs de primitives'
        ], [
            'Passer de la forme algébrique à la forme exponentielle et inversement',
            'Transformer $a \\cos(\\omega t) + b \\sin(\\omega t)$ en $A \\cos(\\omega t + \\phi)$',
            'Résoudre dans $\\mathbb{C}$ une équation du premier degré ou du type $z^2 = a$ ($a \\in \\mathbb{R}$)',
            'Interpréter géométriquement les transformations $z \\mapsto z + b$ et $z \\mapsto a z$'
        ], [
            'Utiliser $e^{i(\\theta+\\phi)} = e^{i\\theta} e^{i\\phi}$',
            'Passer de $r(\\cos \\theta + i \\sin \\theta)$ à $r e^{i\\theta}$'
        ], [
            '$e^{i\\theta} = \\cos \\theta + i \\sin \\theta$',
            '$\\cos \\theta = \\frac{e^{i\\theta} + e^{-i\\theta}}{2}$, $\\sin \\theta = \\frac{e^{i\\theta} - e^{-i\\theta}}{2i}$',
            '$\\cos(a+b) = \\cos a \\cos b - \\sin a \\sin b$',
            '$\\sin(a+b) = \\sin a \\cos b + \\cos a \\sin b$',
            '$\\cos^2 \\theta = \\frac{1+\\cos(2\\theta)}{2}$, $\\sin^2 \\theta = \\frac{1-\\cos(2\\theta)}{2}$'
        ], [
            'Exponentielle complexe',
            'Formules d\'addition et de duplication',
            'Linéarisation'
        ], { 'savoir': 'tres-d', 'savoir-faire': 'tres-d', 'methode': 'tres-d', 'formule': 'coeur',
            'lecon': 'tres-d' }));

        // --- Semaines 29-32 : Synthèse analyse et complexes ---
        DATA.push(sem('29-32', 'Synthèse – analyse et nombres complexes', [
            'Lien entre intégration, exponentielle, logarithme, équations différentielles',
            'Utilisation des complexes en physique (régime sinusoïdal)'
        ], [
            'Résoudre des problèmes de physique utilisant l\'intégration, l\'exponentielle, le logarithme',
            'Utiliser les nombres complexes pour modéliser des signaux sinusoïdaux'
        ], [
            'Choisir l\'outil mathématique adapté (primitive, équation diff., complexe)',
            'Interpréter physiquement les résultats'
        ], [
            'Rappel de toutes les formules'
        ], [
            'Bilan sur l\'analyse et les nombres complexes',
            'Liens avec la physique-chimie'
        ], { 'savoir': 'moyen-f', 'savoir-faire': 'difficile', 'methode': 'difficile', 'formule': 'coeur',
            'lecon': 'moyen-f' }));

        // --- Semaines 33-36 : Préparation au bac et révisions ---
        DATA.push(sem('33-36', 'Révisions et préparation au bac', [
            'Tous les contenus de l\'année'
        ], [
            'Résoudre des exercices de synthèse',
            'Mobiliser les compétences dans des contextes variés (physique-chimie, industrie)'
        ], [
            'Organiser ses révisions par thème',
            'Travailler sur des sujets type bac'
        ], [
            'Toutes les formules à connaître'
        ], [
            'Fiches de révision'
        ], { 'savoir': 'facile', 'savoir-faire': 'moyen-f', 'methode': 'facile', 'formule': 'facile',
            'lecon': 'facile' }));

        // ============================================================
        //  RENDU DYNAMIQUE
        // ============================================================
        const container = document.getElementById('cardsContainer');
        const searchSemaine = document.getElementById('searchSemaine');
        const searchKeyword = document.getElementById('searchKeyword');
        const filterDifficulte = document.getElementById('filterDifficulte');
        const filterType = document.getElementById('filterType');
        const btnReset = document.getElementById('btnReset');
        const nbResultats = document.getElementById('nbResultats');
        const resultCountBadge = document.getElementById('resultCountBadge');

        function render() {
            const semaineFilter = searchSemaine.value.trim().toLowerCase();
            const keyword = searchKeyword.value.trim().toLowerCase();
            const diffFilter = filterDifficulte.value;
            const typeFilter = filterType.value;

            const filtered = DATA.filter(week => {
                if (semaineFilter) {
                    const matchTitle = week.title.toLowerCase().includes(semaineFilter);
                    const matchRange = week.weekRange.toLowerCase().includes(semaineFilter);
                    if (!matchTitle && !matchRange) return false;
                }
                if (keyword) {
                    const matchTitle = week.title.toLowerCase().includes(keyword);
                    const matchItems = week.items.some(item =>
                        item.text.toLowerCase().includes(keyword) ||
                        item.type.toLowerCase().includes(keyword)
                    );
                    if (!matchTitle && !matchItems) return false;
                }
                if (diffFilter) {
                    const hasDiff = week.items.some(item => item.difficulte === diffFilter);
                    if (!hasDiff) return false;
                }
                if (typeFilter) {
                    const hasType = week.items.some(item => item.type === typeFilter);
                    if (!hasType) return false;
                }
                return true;
            });

            nbResultats.textContent = filtered.length;
            resultCountBadge.textContent = filtered.length;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Aucune semaine ne correspond à vos critères.</p>
                        <p style="font-size:0.9rem;color:#94a3b8;">Essayez de modifier les filtres.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(week => {
                const itemsByType = {
                    'savoir': [],
                    'savoir-faire': [],
                    'methode': [],
                    'formule': [],
                    'lecon': []
                };
                week.items.forEach(item => {
                    if (itemsByType[item.type]) itemsByType[item.type].push(item);
                });

                html += `
                    <div class="week-card">
                        <div class="week-header">
                            <h3>Semaine ${week.weekRange}</h3>
                            <span class="badge">${week.items.length} éléments</span>
                        </div>
                        <div class="week-title">${week.title}</div>
                        <div class="content-grid">
                `;

                const typeLabels = {
                    'savoir': '📘 Savoirs',
                    'savoir-faire': '🛠️ Savoir‑faire',
                    'methode': '🧠 Méthodes',
                    'formule': '📐 Formules',
                    'lecon': '📖 Leçons'
                };
                const typeOrder = ['savoir', 'savoir-faire', 'methode', 'formule', 'lecon'];

                typeOrder.forEach(type => {
                    const items = itemsByType[type] || [];
                    if (items.length === 0) return;
                    html += `
                        <div class="content-block">
                            <h4>${typeLabels[type] || type}</h4>
                            <ul>
                    `;
                    items.forEach(item => {
                        const diffLabel = {
                            'facile': 'Facile',
                            'moyen-f': 'Moyennement facile',
                            'moyen-d': 'Moyennement difficile',
                            'difficile': 'Difficile',
                            'tres-d': 'Très difficile',
                            'coeur': 'À connaître par cœur'
                        } [item.difficulte] || item.difficulte;

                        const tagClass = item.difficulte === 'coeur' ? 'coeur' :
                            item.know.includes('retrouver') ? 'retrouver' :
                            item.difficulte;

                        html += `
                            <li>
                                <span>${item.text}</span>
                                <span class="tag ${tagClass}">${diffLabel}</span>
                                ${item.know ? `<span style="font-size:0.65rem;color:#475569;">${item.know}</span>` : ''}
                            </li>
                        `;
                    });
                    html += `</ul></div>`;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        searchSemaine.addEventListener('input', render);
        searchKeyword.addEventListener('input', render);
        filterDifficulte.addEventListener('change', render);
        filterType.addEventListener('change', render);
        btnReset.addEventListener('click', () => {
            searchSemaine.value = '';
            searchKeyword.value = '';
            filterDifficulte.value = '';
            filterType.value = '';
            render();
        });

        render();
    </script>

</body>
</html>
